name: Build
description: Build YDB
inputs:
  sanitizer:
    required: false
    type: string
  ccache_remote_path:
    required: false
    description: "ccache remote storage definition"
  extra_compile_flags:
    required: false
    default: ""
    description: "extra compile flags will be added to the end of C_FLAGS and CXX_FLAGS"
  ninja_target:
    required: false
    type: string

runs:
  using: "composite"
  steps:
  - name: Configure for sanitizer
    shell: bash
    if: inputs.sanitizer
    run: |
      mkdir -p ../build
      patch -p1 < ydb/deploy/patches/0001-sanitizer-build.patch
      
      cd ../build
      rm -rf *
      export CC=/usr/bin/clang-18
      export CC_FOR_BUILD=$CC
      cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
        -DCCACHE_PATH=/usr/local/bin/ccache \
        -DCMAKE_TOOLCHAIN_FILE=../ydb/clang.toolchain \
        -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=./cmake/conan_provider.cmake \
        -DCMAKE_CXX_FLAGS="-fsanitize=${INPUTS_SANITIZER} -g -gsplit-dwarf -gz -fno-omit-frame-pointer ${INPUTS_EXTRA_COMPILE_FLAGS}" \
        -DCMAKE_C_FLAGS="-fsanitize=${INPUTS_SANITIZER} -g -gsplit-dwarf -gz -fno-omit-frame-pointer ${INPUTS_EXTRA_COMPILE_FLAGS}" \
        ../ydb
    env:
      INPUTS_SANITIZER: ${{ inputs.sanitizer }}
      INPUTS_EXTRA_COMPILE_FLAGS: ${{ inputs.extra_compile_flags }}
  - name: Configure
    shell: bash
    if: ${{!inputs.sanitizer}}
    run: |
      mkdir -p ../build
      cd ../build
      rm -rf *
      export CONAN_USER_HOME=`pwd`
      export CC=/usr/bin/clang-18
      export CC_FOR_BUILD=$CC

      # FIXME: set DCMAKE_CXX_FLAGS_RELWITHDEBINFO and DCMAKE_CXX_FLAGS bacause of global_flags.cmake flags override.

      cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
        -DCCACHE_PATH=/usr/local/bin/ccache \
        -DCMAKE_TOOLCHAIN_FILE=../ydb/clang.toolchain \
        -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=./cmake/conan_provider.cmake \
        -DCMAKE_C_FLAGS="${INPUTS_EXTRA_COMPILE_FLAGS}" \
        -DCMAKE_CXX_FLAGS="${INPUTS_EXTRA_COMPILE_FLAGS}" \
        ../ydb
    env:
      INPUTS_EXTRA_COMPILE_FLAGS: ${{ inputs.extra_compile_flags }}
  - name: Build
    shell: bash
    run: |
      ccache -z
      export CCACHE_BASEDIR=`realpath ..`
      export CCACHE_REMOTE_STORAGE="${INPUTS_CCACHE_REMOTE_PATH}"
      export CCACHE_SLOPPINESS=locale
      export CCACHE_MAXSIZE=50G
      cd ../build
      ninja ${INPUTS_NINJA_TARGET}
      ccache -s
      df -h
    env:
      INPUTS_CCACHE_REMOTE_PATH: ${{inputs.ccache_remote_path}}
      INPUTS_NINJA_TARGET: ${{ inputs.ninja_target }}
  - name: report Build failed
    if: ${{ failure() }}
    shell: bash
    run: |
      echo "# Build failed" >> $GITHUB_STEP_SUMMARY
  - name: report Build cancelled
    if: ${{ cancelled() }}
    shell: bash
    run: |
      echo "# Build cancelled" >> $GITHUB_STEP_SUMMARY
