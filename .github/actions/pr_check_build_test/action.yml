name: PR-check build and test core
description: >
  Checkout, YDB credentials, and build_and_test_ya. Caller sets checkout_ref for PR
  merge commits; omit for push (uses github.sha).

inputs:
  checkout_ref:
    required: false
    default: ''
  build_preset:
    required: true
  build_target:
    required: false
    default: 'ydb/'
  test_threads:
    required: false
    default: '52'
  test_size:
    required: false
    default: 'small,medium'
  analytics_job_name:
    required: false
    default: ''
  run_tests:
    required: false
    default: 'true'
  ci_ydb_service_account_key_file_credentials:
    required: true
  ydb_qa_config:
    required: false
    default: ''
  ci_secs:
    required: true
  ci_vars:
    required: true

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}
        fetch-depth: 2
    - name: Setup ydb access
      uses: ./.github/actions/setup_ci_ydb_service_account_key_file_credentials
      with:
        ci_ydb_service_account_key_file_credentials: ${{ inputs.ci_ydb_service_account_key_file_credentials }}
        ydb_qa_config: ${{ inputs.ydb_qa_config }}
    - name: Build and test
      uses: ./.github/actions/build_and_test_ya
      with:
        build_preset: ${{ inputs.build_preset }}
        build_target: ${{ inputs.build_target }}
        increment: true
        run_tests: ${{ inputs.run_tests == 'true' }}
        test_size: ${{ inputs.test_size }}
        test_threads: ${{ inputs.test_threads }}
        put_build_results_to_cache: true
        additional_ya_make_args: -DDEBUGINFO_LINES_ONLY
        analytics_job_name: ${{ inputs.analytics_job_name }}
        secs: ${{ inputs.ci_secs }}
        vars: ${{ inputs.ci_vars }}
