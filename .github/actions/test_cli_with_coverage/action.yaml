name: Ya-Build-Test-Coverage-CLI
inputs:
  bazel_remote_uri:
    type: string
    default: ""
  bazel_remote_username:
    type: string
    default: ""
  bazel_remote_password:
    type: string
    default: ""
  test_threads:
    type: string
    default: "28"
  link_threads:
    type: string
    default: "12"
  warn_only:
    description: "If \"true\", coverage regression is reported but the check does not fail (no blocking, no red status)."
    type: string
    default: "true"
defaults:
  run:
    shell: bash
runs:
  using: composite
  steps:
    - name: Run coverage on base and PR
      if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        BUILD_PRESET: profile
      run: |
        set -exo pipefail

        BAZEL_REMOTE_PASSWORD_FILE=$(mktemp)
        trap 'rm -f "$BAZEL_REMOTE_PASSWORD_FILE"' EXIT
        echo -n "${{ inputs.bazel_remote_password }}" > "$BAZEL_REMOTE_PASSWORD_FILE"

        # ydb/apps/ydb has a trailing slash in the regex to avoid matching ydb/apps/ydbd.
        # PY3TEST integration tests in ydb/tests/functional/ydb_cli DO contribute
        # coverage (verified: LLVM_PROFILE_FILE is inherited by CLI subprocess,
        # profraws land in the suite's coverage.tar). Kept in the target list.
        # --keep-temps preserves build_root binaries so we can rerun llvm-cov
        # ourselves to produce per-directory breakdown (ya's report only gives
        # one overall number).
        run_cli_coverage() {
          local out_dir="$1"
          mkdir -p "$out_dir"
          local params=(
            -tA --build profile
            --clang-coverage --coverage-report
            -DCOVERAGE_TARGET_REGEXP='ydb/apps/ydb/|ydb/public/lib/ydb_cli|ydb/library/workload'
            --coverage-prefix-filter=ydb/apps/ydb/
            --coverage-prefix-filter=ydb/public/lib/ydb_cli
            --coverage-prefix-filter=ydb/library/workload
            --test-threads "${{ inputs.test_threads }}"
            --link-threads "${{ inputs.link_threads }}"
            --keep-temps
            --output "$out_dir"
            --no-dir-outputs
          )
          if [ -n "${{ inputs.bazel_remote_uri }}" ]; then
            params+=(--bazel-remote-store --bazel-remote-base-uri "${{ inputs.bazel_remote_uri }}")
            params+=(--bazel-remote-username "${{ inputs.bazel_remote_username }}")
            params+=(--bazel-remote-password-file "$BAZEL_REMOTE_PASSWORD_FILE")
            params+=(
              --bazel-remote-put
              --dist-cache-max-file-size=209715200
              --dist-cache-evict-test-runs
              --dist-cache-evict-bins
            )
          fi
          ./ya make "${params[@]}" \
            ydb/apps/ydb \
            ydb/public/lib/ydb_cli \
            ydb/library/workload \
            ydb/tests/functional/ydb_cli
        }

        # Extracts overall + per-prefix line coverage from ya's coverage.report.
        # Runs llvm-cov export ourselves against the merged profdata and the
        # instrumented CLI binaries (which --keep-temps preserved in build_root),
        # then aggregates by prefix in Python.
        extract_cli_coverage() {
          local out_dir="$1"
          local json_out="$2"
          local profdata="$out_dir/coverage.report/coverage.profdata"
          # ya logs the exact llvm-cov invocation (with the tool path and all
          # -object args) in build_clang_coverage_report.log. Reusing that
          # tool + binary list gives coverage numbers consistent with ya's own
          # report (matching the LLVM version that produced the profdata and
          # covering all instrumented binaries — including UT test binaries
          # that our heuristic find would miss).
          local ya_log="$out_dir/build_clang_coverage_report.log"
          local llvm_cov
          llvm_cov=$(grep -oE "$HOME/\.ya/tools/v[0-9]+/[0-9]+/bin/llvm-cov" \
                      "$ya_log" 2>/dev/null | head -1)
          if [ -z "$llvm_cov" ] || [ ! -x "$llvm_cov" ]; then
            echo "llvm-cov not found via build_clang_coverage_report.log" >&2
            return 1
          fi

          local -a binary_args=()
          while IFS= read -r bin; do
            [ -f "$bin" ] && binary_args+=(--binary "$bin")
          done < <(python3 - "$ya_log" <<'PY'
import re, sys
log = open(sys.argv[1]).read()
# The `'llvm-cov', 'export'` invocation is on one line; grab its arg list
# and pull out every `'-object', 'PATH'` pair.
m = re.search(r"bin/llvm-cov', 'export'.*?\]", log)
if not m:
    sys.exit(0)
for path in re.findall(r"'-object', '([^']+)'", m.group(0)):
    print(path)
PY
)

          if [ ${#binary_args[@]} -eq 0 ]; then
            echo "no instrumented binaries parsed from $ya_log" >&2
            return 1
          fi

          python3 .github/scripts/tests/aggregate_cli_coverage.py \
            --llvm-cov "$llvm_cov" \
            --profdata "$profdata" \
            "${binary_args[@]}" \
            --prefix ydb/apps/ydb/ \
            --prefix ydb/public/lib/ydb_cli/ \
            --prefix ydb/library/workload/ \
            --output "$json_out"
        }

        MERGE_HEAD=$(git rev-parse HEAD)
        BASE_REF="${{ github.event.pull_request.base.ref }}"
        BASE_OUT="$(pwd)/coverage_workspace/$BASE_REF"
        PR_OUT="$(pwd)/coverage_workspace/pr"
        BASE_COVERAGE_JSON="$BASE_OUT/coverage_summary.json"
        PR_COVERAGE_JSON="$PR_OUT/coverage_summary.json"

        git fetch origin "$BASE_REF"
        git checkout "origin/$BASE_REF"
        run_cli_coverage "$BASE_OUT"
        extract_cli_coverage "$BASE_OUT" "$BASE_COVERAGE_JSON"

        git checkout "$MERGE_HEAD"
        run_cli_coverage "$PR_OUT"
        extract_cli_coverage "$PR_OUT" "$PR_COVERAGE_JSON"

        CURRENT=$(python3 -c 'import json; print(json.load(open("'"$PR_COVERAGE_JSON"'"))["overall"]["line_pct"])')
        BASELINE=$(python3 -c 'import json; print(json.load(open("'"$BASE_COVERAGE_JSON"'"))["overall"]["line_pct"])')

        MSG_FILE=$(mktemp)
        trap 'rm -f "$BAZEL_REMOTE_PASSWORD_FILE" "$MSG_FILE"' EXIT
        if python3 .github/scripts/tests/compare_coverage.py check \
            --label "YDB CLI" --tolerance 5.0 \
            "$PR_COVERAGE_JSON" "$BASE_COVERAGE_JSON" 2> "$MSG_FILE"; then
          STATE=success; COLOR=green
        else
          STATE=failure; COLOR=red
        fi

        if [[ "${{ inputs.warn_only }}" == "true" && "$STATE" == "failure" ]]; then
          printf '\n(warn-only mode, not blocking the PR)\n' >> "$MSG_FILE"
          STATE=success
        fi

        SHA="${{ github.event.pull_request.head.sha }}"
        curl --retry 5 --fail -L -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$SHA" \
          -d "{\"state\":\"$STATE\",\"description\":\"${CURRENT}% vs ${BASE_REF} ${BASELINE}%\",\"context\":\"coverage_cli\"}"
        cat "$MSG_FILE" | .github/scripts/tests/comment-pr.py --color "$COLOR"
        [[ "$STATE" == success ]]
