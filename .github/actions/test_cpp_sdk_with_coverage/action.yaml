name: Ya-Build-Test-Coverage
inputs:
  secs:
    type: string
  vars:
    type: string
  pull_number:
    type: string
    default: ""
  test_threads:
    type: string
    default: "28"
  link_threads:
    type: string
    default: "12"
defaults:
  run:
    shell: bash
runs:
  using: composite
  steps:
    - name: Prepare s3cmd
      uses: ./.github/actions/s3cmd
      with:
        s3_bucket: ${{ fromJSON(inputs.vars).AWS_BUCKET }}
        s3_endpoint: ${{ fromJSON(inputs.vars).AWS_ENDPOINT }}
        s3_key_id: ${{ fromJSON(inputs.secs).AWS_KEY_ID }}
        s3_key_secret: ${{ fromJSON(inputs.secs).AWS_KEY_VALUE }}
        folder_prefix: ya-
        build_preset: profile

    - name: Coverage on main
      if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
      shell: bash
      run: |
        set -ex
        ORIGINAL_HEAD=$(git rev-parse HEAD)
        MAIN_OUT="$(pwd)/coverage_workspace/main"
        git fetch origin main
        git checkout origin/main
        mkdir -p "$MAIN_OUT"
        ./ya make -tA --build profile --clang-coverage --coverage-report \
          -DCOVERAGE_TARGET_REGEXP=ydb/public/sdk/cpp \
          --test-threads "${{ inputs.test_threads }}" --link-threads "${{ inputs.link_threads }}" \
          --output "$MAIN_OUT" ydb/public/sdk/cpp
        python3 .github/scripts/tests/compare_cpp_sdk_coverage.py extract \
          "$MAIN_OUT/coverage.report" "$MAIN_OUT/line_coverage.json"
        git checkout "$ORIGINAL_HEAD"
        echo "MAIN_COVERAGE_JSON=$MAIN_OUT/line_coverage.json" >> $GITHUB_ENV

    - name: Run build and tests
      id: build
      uses: ./.github/actions/test_ya
      with:
        build_target: ydb/public/sdk/cpp
        build_preset: profile
        run_tests: true
        increment: false
        test_size: small,medium,large
        test_threads: ${{ inputs.test_threads }}
        link_threads: ${{ inputs.link_threads }}
        put_build_results_to_cache: false
        pull_number: ${{ inputs.pull_number }}
        additional_ya_make_args: >-
          --clang-coverage --coverage-report
          -DCOVERAGE_TARGET_REGEXP=ydb/public/sdk/cpp
        bazel_remote_uri: ${{ fromJSON(inputs.vars).REMOTE_CACHE_URL || '' }}
        bazel_remote_username: ${{ fromJSON(inputs.secs).REMOTE_CACHE_USERNAME || '' }}
        bazel_remote_password: ${{ fromJSON(inputs.secs).REMOTE_CACHE_PASSWORD || '' }}
        telegram_ydbot_token: ${{ fromJSON(inputs.secs).TELEGRAM_YDBOT_TOKEN || '' }}
        telegram_alert_logins: ${{ fromJSON(inputs.vars).GH_ALERTS_TG_LOGINS || '' }}
        telegram_alert_chat: ${{ fromJSON(inputs.vars).GH_ALERTS_TG_CHAT || '' }}

    - name: Coverage gate
      if: steps.build.outputs.success == 'true' && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -ex
        CURRENT_JSON="$PUBLIC_DIR/current_line_coverage.json"
        python3 .github/scripts/tests/compare_cpp_sdk_coverage.py extract \
          "$TMP_DIR/out/coverage.report" "$CURRENT_JSON"
        CURRENT=$(python3 -c 'import json; print(json.load(open("'"$CURRENT_JSON"'"))["line_pct"])')
        MAIN=$(python3 -c 'import json; print(json.load(open("'"$MAIN_COVERAGE_JSON"'"))["line_pct"])')
        if python3 .github/scripts/tests/compare_cpp_sdk_coverage.py check "$CURRENT_JSON" "$MAIN_COVERAGE_JSON"; then
          STATE=success; COLOR=green; MSG="CPP SDK line coverage: ${CURRENT}% (main: ${MAIN}%) — OK"
        else
          STATE=failure; COLOR=red; MSG="CPP SDK line coverage: ${CURRENT}% (main: ${MAIN}%) — FAILED"
        fi
        SHA="${{ github.event.pull_request.head.sha }}"
        curl --retry 5 --fail -L -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$SHA" \
          -d "{\"state\":\"$STATE\",\"description\":\"${CURRENT}% vs main ${MAIN}%\",\"context\":\"coverage_cpp_sdk\"}"
        echo "$MSG" | .github/scripts/tests/comment-pr.py --color "$COLOR"
        [[ "$STATE" == success ]]
