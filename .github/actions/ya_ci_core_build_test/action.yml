name: Ya CI core (build and test)
description: >
  Shared checkout, preset resolution, optional blacklist, credentials, and build_and_test_ya.
  Presets: .github/config/ci_presets.json (source of truth; bundled fallback in this action for
  branches without that file). Profiles ci | run_tests. Step timeout from config; workflow jobs
  should set timeout-minutes as an outer safety net.

inputs:
  profile:
    required: false
    default: ci
    description: Preset profile from ci_presets.json (ci for PR-check/postmerge, run_tests for Run-tests workflow).
  build_preset:
    required: true
  checkout_ref:
    required: false
    default: ''
  fetch_depth:
    required: false
    default: '2'
  test_threads:
    required: false
    default: ''
    description: >
      ci profile — optional direct override. run_tests profile — optional base count scaled
      per preset via test_threads_base_ratio in ci_presets.json; empty = preset defaults.
  test_size:
    required: false
    default: ''
  test_type:
    required: false
    default: ''
  link_threads:
    required: false
    default: ''
  timeout_minutes:
    required: false
    default: ''
  build_target:
    required: false
    default: 'ydb/'
  increment:
    required: false
    default: 'true'
  run_tests:
    required: false
    default: 'true'
  run_build:
    required: false
    default: 'true'
  additional_ya_make_args:
    required: false
    default: '-DDEBUGINFO_LINES_ONLY'
  additional_ya_make_args_append:
    required: false
    default: ''
  blacklist_paths:
    required: false
    default: ''
  test_retry_count:
    required: false
    default: ''
  custom_branch_name:
    required: false
    default: ''
  pull_number:
    required: false
    default: ''
  collect_coredumps:
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.checkout_ref || github.sha }}
        fetch-depth: ${{ inputs.fetch_depth }}

    - name: Resolve CI preset defaults
      id: preset
      shell: python
      env:
        REPO_ROOT: ${{ github.workspace }}
        FALLBACK_CONFIG_PATH: ${{ github.action_path }}/ci_presets.json
        PROFILE: ${{ inputs.profile }}
        BUILD_PRESET: ${{ inputs.build_preset }}
        OVERRIDE_THREADS: ${{ inputs.profile == 'ci' && inputs.test_threads || '' }}
        TEST_THREADS_BASE: ${{ inputs.profile == 'run_tests' && inputs.test_threads || '' }}
        OVERRIDE_SIZE: ${{ inputs.test_size }}
        OVERRIDE_TYPE: ${{ inputs.test_type }}
        OVERRIDE_LINK: ${{ inputs.link_threads }}
        OVERRIDE_TIMEOUT: ${{ inputs.timeout_minutes }}
      run: python3 "${{ github.action_path }}/resolve_ci_preset.py"

    - name: Optional test blacklist file
      id: blacklist
      shell: bash
      env:
        BLACKLIST_PATHS: ${{ inputs.blacklist_paths }}
      run: |
        if [ -z "${BLACKLIST_PATHS}" ]; then
          echo "extra_ya_args=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        BLACKLIST_FILE="${RUNNER_TEMP}/test_blacklist.yaml"
        > "$BLACKLIST_FILE"
        while IFS= read -r path; do
          [ -z "$path" ] && continue
          echo "- path: $path" >> "$BLACKLIST_FILE"
        done <<< "$BLACKLIST_PATHS"
        echo "extra_ya_args=--test-blacklist-path ${BLACKLIST_FILE}" >> "$GITHUB_OUTPUT"

    - name: Merge ya make arguments
      id: merged_ya
      shell: bash
      env:
        BASE: ${{ inputs.additional_ya_make_args }}
        APP: ${{ inputs.additional_ya_make_args_append }}
        BL: ${{ steps.blacklist.outputs.extra_ya_args }}
      run: |
        out="${BASE}"
        [ -n "${APP// }" ] && out="${out} ${APP}"
        [ -n "${BL// }" ] && out="${out} ${BL}"
        echo "args=${out}" >> "$GITHUB_OUTPUT"

    - name: Setup ydb access
      uses: ./.github/actions/setup_ci_ydb_service_account_key_file_credentials
      with:
        ci_ydb_service_account_key_file_credentials: ${{ secrets.CI_YDB_SERVICE_ACCOUNT_KEY_FILE_CREDENTIALS }}
        ydb_qa_config: ${{ vars.YDB_QA_CONFIG }}

    - name: Build and test
      timeout-minutes: ${{ steps.preset.outputs.timeout_minutes }}
      uses: ./.github/actions/build_and_test_ya
      with:
        build_preset: ${{ inputs.build_preset }}
        build_target: ${{ inputs.build_target }}
        increment: ${{ inputs.increment == true || inputs.increment == 'true' }}
        run_build: ${{ inputs.run_build == true || inputs.run_build == 'true' }}
        run_tests: ${{ inputs.run_tests == true || inputs.run_tests == 'true' }}
        test_size: ${{ steps.preset.outputs.test_size }}
        test_type: ${{ steps.preset.outputs.test_type }}
        test_threads: ${{ steps.preset.outputs.test_threads }}
        link_threads: ${{ steps.preset.outputs.link_threads }}
        test_retry_count: ${{ inputs.test_retry_count }}
        custom_branch_name: ${{ inputs.custom_branch_name }}
        pull_number: ${{ inputs.pull_number }}
        collect_coredumps: ${{ inputs.collect_coredumps == true || inputs.collect_coredumps == 'true' }}
        put_build_results_to_cache: true
        additional_ya_make_args: ${{ steps.merged_ya.outputs.args }}
        secs: ${{ format('{{"AWS_KEY_ID":"{0}","AWS_KEY_VALUE":"{1}","REMOTE_CACHE_USERNAME":"{2}","REMOTE_CACHE_PASSWORD":"{3}","YDBOT_TELEGRAM_BOT_TOKEN":"{4}"}}',
          secrets.AWS_KEY_ID, secrets.AWS_KEY_VALUE, secrets.REMOTE_CACHE_USERNAME, secrets.REMOTE_CACHE_PASSWORD, secrets.YDBOT_TELEGRAM_BOT_TOKEN ) }}
        vars: ${{ format('{{"AWS_BUCKET":"{0}","AWS_ENDPOINT":"{1}","REMOTE_CACHE_URL":"{2}","GH_ALERTS_TG_LOGINS":"{3}","GH_ALERTS_TG_CHAT":"{4}"}}',
          vars.AWS_BUCKET, vars.AWS_ENDPOINT, vars.REMOTE_CACHE_URL_YA, vars.GH_ALERTS_TG_LOGINS, vars.GH_ALERTS_TG_CHAT ) }}
