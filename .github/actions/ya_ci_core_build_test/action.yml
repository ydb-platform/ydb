name: Ya CI core (build and test)
description: >
  Default preset map (threads, sizes, timeout_minutes per build_preset); optional overrides.
  Optional blacklist, checkout, build_and_test_ya. Job-level timeout-minutes is still on the workflow job.

inputs:
  build_preset:
    required: true
  checkout_ref:
    required: false
    default: ''
  fetch_depth:
    required: false
    default: '2'
  test_threads:
    required: false
    default: ''
  test_size:
    required: false
    default: ''
  test_type:
    required: false
    default: ''
  link_threads:
    required: false
    default: ''
  timeout_minutes:
    required: false
    default: ''
    description: >-
      Max minutes for the Build and test step; empty = use preset map / fallback.
  build_target:
    required: false
    default: 'ydb/'
  increment:
    required: false
    default: 'true'
  run_tests:
    required: false
    default: 'true'
  run_build:
    required: false
    default: 'true'
  additional_ya_make_args:
    required: false
    default: '-DDEBUGINFO_LINES_ONLY'
  additional_ya_make_args_append:
    required: false
    default: ''
  blacklist_paths:
    required: false
    default: ''
  test_retry_count:
    required: false
    default: ''
  custom_branch_name:
    required: false
    default: ''
  pull_number:
    required: false
    default: ''
  collect_coredumps:
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Resolve CI preset defaults
      id: preset
      shell: python
      env:
        BUILD_PRESET: ${{ inputs.build_preset }}
        OVERRIDE_THREADS: ${{ inputs.test_threads }}
        OVERRIDE_SIZE: ${{ inputs.test_size }}
        OVERRIDE_TYPE: ${{ inputs.test_type }}
        OVERRIDE_LINK: ${{ inputs.link_threads }}
        OVERRIDE_TIMEOUT: ${{ inputs.timeout_minutes }}
      run: |
        import os

        # test_type "" = no --test-type filter (all types).
        FALLBACK = {
            "test_threads": "52",
            "test_size": "small,medium",
            "link_threads": "12",
            "test_type": "",
            "timeout_minutes": "600",
        }

        PRESET_MAP = {
            "relwithdebinfo": {
                "test_threads": "52",
                "test_size": "small,medium",
                "link_threads": "12",
                "test_type": "",
                "timeout_minutes": "600",
            },
            "release-asan": {
                "test_threads": "52",
                "test_size": "small,medium",
                "link_threads": "12",
                "test_type": "",
                "timeout_minutes": "600",
            },
            "release-tsan": {
                "test_threads": "52",
                "test_size": "small,medium",
                "link_threads": "12",
                "test_type": "",
                "timeout_minutes": "600",
            },
            "release-msan": {
                "test_threads": "52",
                "test_size": "small,medium",
                "link_threads": "12",
                "test_type": "",
                "timeout_minutes": "600",
            },
        }

        p = os.environ["BUILD_PRESET"]
        base = {**FALLBACK, **PRESET_MAP.get(p, {})}

        threads = os.environ.get("OVERRIDE_THREADS", "").strip() or base["test_threads"]
        size = os.environ.get("OVERRIDE_SIZE", "").strip() or base["test_size"]
        typ = os.environ.get("OVERRIDE_TYPE", "").strip() or base["test_type"]
        link = os.environ.get("OVERRIDE_LINK", "").strip() or base["link_threads"]
        timeout_m = os.environ.get("OVERRIDE_TIMEOUT", "").strip() or base["timeout_minutes"]

        out = os.environ["GITHUB_OUTPUT"]
        with open(out, "a", encoding="utf-8") as f:
            f.write(f"test_threads={threads}\n")
            f.write(f"test_size={size}\n")
            f.write(f"test_type={typ}\n")
            f.write(f"link_threads={link}\n")
            f.write(f"timeout_minutes={timeout_m}\n")

    - name: Optional test blacklist file
      id: blacklist
      shell: bash
      env:
        BLACKLIST_PATHS: ${{ inputs.blacklist_paths }}
      run: |
        if [ -z "${BLACKLIST_PATHS}" ]; then
          echo "extra_ya_args=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        BLACKLIST_FILE="${RUNNER_TEMP}/test_blacklist.yaml"
        > "$BLACKLIST_FILE"
        while IFS= read -r path; do
          [ -z "$path" ] && continue
          echo "- path: $path" >> "$BLACKLIST_FILE"
        done <<< "$BLACKLIST_PATHS"
        echo "extra_ya_args=--test-blacklist-path ${BLACKLIST_FILE}" >> "$GITHUB_OUTPUT"

    - name: Merge ya make arguments
      id: merged_ya
      shell: bash
      run: |
        base="${{ inputs.additional_ya_make_args }}"
        app="${{ inputs.additional_ya_make_args_append }}"
        bl="${{ steps.blacklist.outputs.extra_ya_args }}"
        out="${base}"
        [ -n "${app// }" ] && out="${out} ${app}"
        [ -n "${bl// }" ] && out="${out} ${bl}"
        echo "args=${out}" >> "$GITHUB_OUTPUT"

    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.checkout_ref || github.sha }}
        fetch-depth: ${{ inputs.fetch_depth }}

    - name: Setup ydb access
      uses: ./.github/actions/setup_ci_ydb_service_account_key_file_credentials
      with:
        ci_ydb_service_account_key_file_credentials: ${{ secrets.CI_YDB_SERVICE_ACCOUNT_KEY_FILE_CREDENTIALS }}

    - name: Build and test
      timeout-minutes: ${{ steps.preset.outputs.timeout_minutes }}
      uses: ./.github/actions/build_and_test_ya
      with:
        build_preset: ${{ inputs.build_preset }}
        build_target: ${{ inputs.build_target }}
        increment: ${{ inputs.increment == true || inputs.increment == 'true' }}
        run_build: ${{ inputs.run_build == true || inputs.run_build == 'true' }}
        run_tests: ${{ inputs.run_tests == true || inputs.run_tests == 'true' }}
        test_size: ${{ steps.preset.outputs.test_size }}
        test_type: ${{ steps.preset.outputs.test_type }}
        test_threads: ${{ steps.preset.outputs.test_threads }}
        link_threads: ${{ steps.preset.outputs.link_threads }}
        test_retry_count: ${{ inputs.test_retry_count }}
        custom_branch_name: ${{ inputs.custom_branch_name }}
        pull_number: ${{ inputs.pull_number }}
        collect_coredumps: ${{ inputs.collect_coredumps == true || inputs.collect_coredumps == 'true' }}
        put_build_results_to_cache: true
        additional_ya_make_args: ${{ steps.merged_ya.outputs.args }}
        secs: ${{ format('{{"AWS_KEY_ID":"{0}","AWS_KEY_VALUE":"{1}","REMOTE_CACHE_USERNAME":"{2}","REMOTE_CACHE_PASSWORD":"{3}","TELEGRAM_YDBOT_TOKEN":"{4}"}}',
          secrets.AWS_KEY_ID, secrets.AWS_KEY_VALUE, secrets.REMOTE_CACHE_USERNAME, secrets.REMOTE_CACHE_PASSWORD, secrets.TELEGRAM_YDBOT_TOKEN ) }}
        vars: ${{ format('{{"AWS_BUCKET":"{0}","AWS_ENDPOINT":"{1}","REMOTE_CACHE_URL":"{2}","GH_ALERTS_TG_LOGINS":"{3}","GH_ALERTS_TG_CHAT":"{4}"}}',
          vars.AWS_BUCKET, vars.AWS_ENDPOINT, vars.REMOTE_CACHE_URL_YA, vars.GH_ALERTS_TG_LOGINS, vars.GH_ALERTS_TG_CHAT ) }}
