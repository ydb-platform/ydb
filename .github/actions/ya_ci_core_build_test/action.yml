name: Ya CI core (build and test)
description: >
  Shared checkout, optional blacklist, credentials, thread scaling,
  branch mapping, and build_and_test_ya.

inputs:
  build_preset:
    required: true
  checkout_ref:
    required: false
    default: ''
  fetch_depth:
    required: false
    default: '2'
  test_threads:
    required: false
    default: '52'
  scale_test_threads_by_preset:
    required: false
    default: 'false'
  test_size:
    required: false
    default: 'small,medium'
  test_type:
    required: false
    default: ''
  link_threads:
    required: false
    default: '12'
  build_target:
    required: false
    default: 'ydb/'
  increment:
    required: false
    default: 'true'
  run_tests:
    required: false
    default: 'true'
  run_build:
    required: false
    default: 'true'
  additional_ya_make_args:
    required: false
    default: '-DDEBUGINFO_LINES_ONLY'
  additional_ya_make_args_append:
    required: false
    default: ''
  blacklist_paths:
    required: false
    default: ''
  test_retry_count:
    required: false
    default: ''
  custom_branch_name:
    required: false
    default: ''
  pull_number:
    required: false
    default: ''
  branch_name_map:
    required: false
    default: ''
  pr_number_map:
    required: false
    default: ''
  collect_coredumps:
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.checkout_ref || github.sha }}
        fetch-depth: ${{ inputs.fetch_depth }}

    - name: Optional test blacklist file
      id: blacklist
      shell: bash
      env:
        BLACKLIST_PATHS: ${{ inputs.blacklist_paths }}
      run: |
        if [ -z "${BLACKLIST_PATHS}" ]; then
          echo "extra_ya_args=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        BLACKLIST_FILE="${RUNNER_TEMP}/test_blacklist.yaml"
        > "$BLACKLIST_FILE"
        while IFS= read -r path; do
          [ -z "$path" ] && continue
          echo "- path: $path" >> "$BLACKLIST_FILE"
        done <<< "$BLACKLIST_PATHS"
        echo "extra_ya_args=--test-blacklist-path ${BLACKLIST_FILE}" >> "$GITHUB_OUTPUT"

    - name: Merge ya make arguments
      id: merged_ya
      shell: bash
      env:
        BASE: ${{ inputs.additional_ya_make_args }}
        APP: ${{ inputs.additional_ya_make_args_append }}
        BL: ${{ steps.blacklist.outputs.extra_ya_args }}
      run: |
        out="${BASE}"
        [ -n "${APP// }" ] && out="${out} ${APP}"
        [ -n "${BL// }" ] && out="${out} ${BL}"
        echo "args=${out}" >> "$GITHUB_OUTPUT"

    - name: Scale test threads by preset
      id: threads
      shell: bash
      env:
        SCALE: ${{ inputs.scale_test_threads_by_preset }}
        TEST_THREADS: ${{ inputs.test_threads }}
        BUILD_PRESET: ${{ inputs.build_preset }}
      run: |
        threads="$TEST_THREADS"
        if [ "$SCALE" = "true" ]; then
          case "$BUILD_PRESET" in
            relwithdebinfo) ;;
            release-asan) threads=$(awk "BEGIN {x=$TEST_THREADS * 0.38; printf \"%.0f\", (x < 1 ? 1 : x)}") ;;
            release-msan) threads=$(awk "BEGIN {x=$TEST_THREADS * 0.1; printf \"%.0f\", (x < 1 ? 1 : x)}") ;;
            release-tsan) threads=$(awk "BEGIN {x=$TEST_THREADS * 0.35; printf \"%.0f\", (x < 1 ? 1 : x)}") ;;
            *)
              echo "Unknown build_preset value: $BUILD_PRESET"
              exit 1
              ;;
          esac
        fi
        echo "count=${threads}" >> "$GITHUB_OUTPUT"

    - name: Resolve test history branch
      id: branch
      shell: bash
      env:
        BRANCH_NAME_MAP: ${{ inputs.branch_name_map }}
        PR_NUMBER_MAP: ${{ inputs.pr_number_map }}
        CHECKOUT_REF: ${{ inputs.checkout_ref || github.sha }}
        CUSTOM_BRANCH_NAME: ${{ inputs.custom_branch_name }}
        PULL_NUMBER: ${{ inputs.pull_number }}
      run: |
        branch_name="$CUSTOM_BRANCH_NAME"
        pr_number="$PULL_NUMBER"

        if [ -n "$BRANCH_NAME_MAP" ] && [ "$BRANCH_NAME_MAP" != "{}" ]; then
          mapped=$(echo "$BRANCH_NAME_MAP" | jq -r --arg branch "$CHECKOUT_REF" '.[$branch] // empty')
          if [ -n "$mapped" ] && [ "$mapped" != "null" ]; then
            branch_name="$mapped"
          elif [ -z "$branch_name" ]; then
            branch_name="$CHECKOUT_REF"
          fi
        fi

        if [ -n "$PR_NUMBER_MAP" ] && [ "$PR_NUMBER_MAP" != "{}" ]; then
          mapped_pr=$(echo "$PR_NUMBER_MAP" | jq -r --arg branch "$CHECKOUT_REF" '.[$branch] // empty')
          if [ -n "$mapped_pr" ] && [ "$mapped_pr" != "null" ]; then
            pr_number="$mapped_pr"
          fi
        fi

        echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"
        echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

    - name: Setup ydb access
      uses: ./.github/actions/setup_ci_ydb_service_account_key_file_credentials
      with:
        ci_ydb_service_account_key_file_credentials: ${{ secrets.CI_YDB_SERVICE_ACCOUNT_KEY_FILE_CREDENTIALS }}
        ydb_qa_config: ${{ vars.YDB_QA_CONFIG }}

    - name: Build and test
      uses: ./.github/actions/build_and_test_ya
      with:
        build_preset: ${{ inputs.build_preset }}
        build_target: ${{ inputs.build_target }}
        increment: ${{ inputs.increment == true || inputs.increment == 'true' }}
        run_build: ${{ inputs.run_build == true || inputs.run_build == 'true' }}
        run_tests: ${{ inputs.run_tests == true || inputs.run_tests == 'true' }}
        test_size: ${{ inputs.test_size }}
        test_type: ${{ inputs.test_type }}
        test_threads: ${{ steps.threads.outputs.count }}
        link_threads: ${{ inputs.link_threads }}
        test_retry_count: ${{ inputs.test_retry_count }}
        custom_branch_name: ${{ steps.branch.outputs.branch_name }}
        pull_number: ${{ steps.branch.outputs.pr_number }}
        collect_coredumps: ${{ inputs.collect_coredumps == true || inputs.collect_coredumps == 'true' }}
        put_build_results_to_cache: true
        additional_ya_make_args: ${{ steps.merged_ya.outputs.args }}
        secs: ${{ format('{{"AWS_KEY_ID":"{0}","AWS_KEY_VALUE":"{1}","REMOTE_CACHE_USERNAME":"{2}","REMOTE_CACHE_PASSWORD":"{3}","YDBOT_TELEGRAM_BOT_TOKEN":"{4}"}}',
          secrets.AWS_KEY_ID, secrets.AWS_KEY_VALUE, secrets.REMOTE_CACHE_USERNAME, secrets.REMOTE_CACHE_PASSWORD, secrets.YDBOT_TELEGRAM_BOT_TOKEN ) }}
        vars: ${{ format('{{"AWS_BUCKET":"{0}","AWS_ENDPOINT":"{1}","REMOTE_CACHE_URL":"{2}","GH_ALERTS_TG_LOGINS":"{3}","GH_ALERTS_TG_CHAT":"{4}"}}',
          vars.AWS_BUCKET, vars.AWS_ENDPOINT, vars.REMOTE_CACHE_URL_YA, vars.GH_ALERTS_TG_LOGINS, vars.GH_ALERTS_TG_CHAT ) }}
