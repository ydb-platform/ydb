# Mute v4 — Pattern Rules
# Правила определяют: что искать (pattern), где (scope), с какими порогами (params), и что делать (reaction)
#
# pattern: тип паттерна (test_flaky, test_stable, test_no_runs, quarantine_graduation)
# scope: regression | pr_check
# build_types: для каких build type применяется (null = все)
# params: пороги для проверки
# reaction: mute | unmute | delete | remove_from_quarantine | alert | log

rules:
  # === Mute: добавить в muted_ya ===
  - id: regression_flaky_mute
    name: "Flaky в regression — mute"
    pattern: test_flaky
    scope: regression
    build_types: [relwithdebinfo]
    params:
      window_days: 4
      min_failures_high: 3
      min_failures_low: 2
      min_runs_threshold: 10
      # error_filter: null = все типы, ["timeout"] = только timeout, ["!timeout"] = всё кроме timeout
      # Требует error_type в данных (пока не реализовано)
      error_filter: null
    reaction: mute

  # Mute только timeout (когда будет error_type в агрегации)
  - id: regression_flaky_timeout_mute
    name: "Flaky timeout в regression — mute"
    pattern: test_flaky
    scope: regression
    build_types: [relwithdebinfo]
    params:
      window_days: 4
      min_failures_high: 3
      min_failures_low: 2
      min_runs_threshold: 10
      error_filter: ["timeout", "TIMEOUT"]
    reaction: mute
    enabled: false  # включить когда error_type будет в tests_monitor

  # === Unmute: убрать из muted_ya ===
  - id: regression_stable_unmute
    name: "Stable в regression — unmute"
    pattern: test_stable
    scope: regression
    build_types: [relwithdebinfo]
    params:
      window_days: 7
      min_runs: 4
      max_fails: 0  # total_fails (fail + mute) must be 0
    reaction: unmute

  # === Delete: убрать из muted_ya (нет запусков) ===
  - id: regression_no_runs_delete
    name: "No runs в regression — delete"
    pattern: test_no_runs
    scope: regression
    build_types: [relwithdebinfo]
    params:
      window_days: 7
    reaction: delete

  # === Quarantine graduation ===
  - id: quarantine_graduation
    name: "Quarantine graduation"
    pattern: quarantine_graduation
    scope: regression
    build_types: [relwithdebinfo]
    params:
      window_days: 1
      min_runs: 4
      min_passes: 1
    reaction: remove_from_quarantine

  # === PR-check: детекция без mute (reaction: log) ===
  - id: pr_check_floating_timeout
    name: "Плавающий таймаут в PR-check (suite-level)"
    pattern: floating_across_days
    scope: pr_check
    build_types: [relwithdebinfo]
    params:
      window_days: 7
      min_total_fails: 3
      max_per_test: 2
    reaction: log
    # Записывает в pattern_matches, не mute

  - id: pr_check_retry_recovered
    name: "Падает на attempt 1, проходит на retry"
    pattern: retry_recovered
    scope: pr_check
    build_types: [relwithdebinfo]
    params:
      window_days: 7
    reaction: log

  # === Muted test с другим error_type — алерт ===
  - id: muted_test_error_changed
    name: "Muted тест упал с другим типом ошибки"
    pattern: muted_test_different_error
    scope: regression
    build_types: [relwithdebinfo]
    params: {}
    reaction: alert
    # Требует: mute с error_type, проверка при run
