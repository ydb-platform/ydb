name: Automerge PR
on:
  schedule:
    - cron: "17 * * * *"   # At minute 17 past every hour
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
env:
  GH_TOKEN: ${{ secrets.YDBOT_TOKEN }}
jobs:
  check-pr:
    runs-on: [self-hosted, tiny-worker]
    timeout-minutes: 70
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            ydb/ci/
      - name: install packages
        shell: bash
        run: |
          pip install PyGithub==2.5.0

      - name: configure
        shell: bash
        run: |
            git config --global user.name YDBot
            git config --global user.email ydbot@ydb.tech
            git config --local github.token ${{ env.GH_TOKEN }}

      - name: run-command
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ env.GH_TOKEN }}
        run: |
          set -euo pipefail
          cd ./ydb/ci/rightlib
          loop_interval_seconds=300
          loop_iterations=12

          for ((iteration=1; iteration<=loop_iterations; iteration++)); do
            echo "::group::automerge iteration ${iteration}/${loop_iterations}"
            ./automerge.py
            echo "::endgroup::"

            if (( iteration < loop_iterations )); then
              sleep "${loop_interval_seconds}"
            fi
          done
