name: Build-YDB-CLI
run-name: Build YDB CLI

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      version-change:
        description: "PATCH for bug fixes, MINOR for new features"
        required: true
        type: choice
        options:
          - PATCH
          - MINOR
        default: PATCH
      commit_sha:
        description: Do not change this unless you know what you are doing
        type: string
        default: ""
      build-linux-amd:
        type: boolean
        description: Build YDB CLI for Linux (amd64)
        default: true
      build-linux-arm:
        type: boolean
        description: Build YDB CLI for Linux (arm64)
        default: true
      build-darwin-amd:
        type: boolean
        description: Build YDB CLI for MacOS (amd64)
        default: true
      build-darwin-arm:
        type: boolean
        description: Build YDB CLI for MacOS (arm64)
        default: true
      build-windows-amd:
        type: boolean
        description: Build YDB CLI for Windows (amd64)
        default: true
defaults:
  run:
    shell: bash

jobs:
  prepare-release:
    name: Prepare release branch and update version
    runs-on: ubuntu-latest
    outputs:
      branch-name: ${{ steps.do-prepare-release.outputs.branch-name }}
      new-version: ${{ steps.do-prepare-release.outputs.new-version }}
      release-commit-sha: ${{ steps.do-prepare-release.outputs.release-commit-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.YDBOT_TOKEN }}
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0
      - name: Configure git
        uses: ./.github/actions/configure_git
      - name: Prepare release
        id: do-prepare-release
        uses: ./.github/actions/prepare_release
        with:
          version-change: ${{ inputs.version-change }}
          version-file: ydb/apps/ydb/version.txt
          changelog-file: ydb/apps/ydb/CHANGELOG.md
          branch-prefix: "cli-release/"
          product-name: "YDB CLI"
          version-artifact-name: "cli-version"

  build:
    name: Build binaries
    needs: prepare-release
    uses: ./.github/workflows/build_binaries.yml
    with:
      build-target: ydb/apps/ydb
      binary-name: ydb
      ref: ${{ needs.prepare-release.outputs.branch-name }}
      build-linux-amd: ${{ inputs.build-linux-amd }}
      build-linux-arm: ${{ inputs.build-linux-arm }}
      build-darwin-amd: ${{ inputs.build-darwin-amd }}
      build-darwin-arm: ${{ inputs.build-darwin-arm }}
      build-windows-amd: ${{ inputs.build-windows-amd }}

  gather-and-push-to-s3:
    name: Gather built binaries and push to s3
    needs: [prepare-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.branch-name }}
      - name: Print YDB CLI version ${{ needs.prepare-release.outputs.new-version }}
        run: echo ${{ needs.prepare-release.outputs.new-version }}
      - name: Gather and upload to S3
        uses: ./.github/actions/gather_and_upload_to_s3
        with:
          version: ${{ needs.prepare-release.outputs.new-version }}
          s3-bucket: "yandexcloud-ydb"
          s3-key-id: ${{ secrets.CLI_S3_KEY_ID }}
          s3-key-secret: ${{ secrets.CLI_S3_KEY_SECRET_ID }}
          build-linux-amd: ${{ inputs.build-linux-amd }}
          build-linux-arm: ${{ inputs.build-linux-arm }}
          build-darwin-amd: ${{ inputs.build-darwin-amd }}
          build-darwin-arm: ${{ inputs.build-darwin-arm }}
          build-windows-amd: ${{ inputs.build-windows-amd }}

  finalize-release:
    name: Merge to main and finalize release
    needs: [prepare-release, gather-and-push-to-s3]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Finalize release
        uses: ./.github/actions/finalize_release
        with:
          version: ${{ needs.prepare-release.outputs.new-version }}
          branch-name: ${{ needs.prepare-release.outputs.branch-name }}
          release-commit-sha: ${{ needs.prepare-release.outputs.release-commit-sha }}
          tag-prefix: "CLI_"
          product-name: "YDB CLI"
          token: ${{ secrets.YDBOT_TOKEN }}

  cleanup-on-failure:
    name: Cleanup release branch on failure
    needs: [prepare-release, gather-and-push-to-s3]
    runs-on: ubuntu-latest
    if: failure() && needs.prepare-release.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.YDBOT_TOKEN }}
          fetch-depth: 0
      - name: Configure git
        uses: ./.github/actions/configure_git
      - name: Delete release branch
        run: |
          # Delete the branch
          git push origin --delete "${{ needs.prepare-release.outputs.branch-name }}" || echo "Branch already deleted"
