name: CPP SDK coverage

on:
  pull_request_target:
    branches:
      - main
      - stable-*
      - prestable-*
      - stream-nb-*
      - dev-*
      - rc-*
      - q-stable-*
    types:
      - labeled

concurrency:
  group: cpp-sdk-coverage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cpp_sdk_coverage:
    if: github.event.label.name == 'sdk-coverage' && github.event.pull_request.state == 'open'
    runs-on: [self-hosted, auto-provisioned, build-preset-relwithdebinfo]
    name: CPP SDK coverage
    timeout-minutes: 480
    steps:
      - name: Verify PR is mergeable
        uses: actions/github-script@v8
        with:
          script: |
            let pr = context.payload.pull_request;
            if (pr.mergeable == null || !pr.merge_commit_sha) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });
              pr = data;
            }
            if (!pr.mergeable || !pr.merge_commit_sha) {
              core.setFailed(
                'Unable to merge PR into the base branch. Please rebase or resolve conflicts and re-add the sdk-coverage label.'
              );
            }

      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Setup ydb access
        uses: ./.github/actions/setup_ci_ydb_service_account_key_file_credentials
        with:
          ci_ydb_service_account_key_file_credentials: ${{ secrets.CI_YDB_SERVICE_ACCOUNT_KEY_FILE_CREDENTIALS }}
          ydb_qa_config: ${{ vars.YDB_QA_CONFIG }}

      - name: Build, test, and check coverage
        uses: ./.github/actions/test_cpp_sdk_with_coverage
        with:
          pull_number: ${{ github.event.pull_request.number }}
          secs: ${{ format('{{"AWS_KEY_ID":"{0}","AWS_KEY_VALUE":"{1}","REMOTE_CACHE_USERNAME":"{2}","REMOTE_CACHE_PASSWORD":"{3}","TELEGRAM_YDBOT_TOKEN":"{4}"}}',
            secrets.AWS_KEY_ID, secrets.AWS_KEY_VALUE, secrets.REMOTE_CACHE_USERNAME, secrets.REMOTE_CACHE_PASSWORD, secrets.TELEGRAM_YDBOT_TOKEN ) }}
          vars: ${{ format('{{"AWS_BUCKET":"{0}","AWS_ENDPOINT":"{1}","REMOTE_CACHE_URL":"{2}","GH_ALERTS_TG_LOGINS":"{3}","GH_ALERTS_TG_CHAT":"{4}"}}',
            vars.AWS_BUCKET, vars.AWS_ENDPOINT, vars.REMOTE_CACHE_URL_YA, vars.GH_ALERTS_TG_LOGINS, vars.GH_ALERTS_TG_CHAT ) }}
