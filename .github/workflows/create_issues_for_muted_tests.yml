name: Create issues for muted tests

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
        pr_number:
            description: 'The pull request number (for comment / append body)'
            required: true
            type: number
        base_branch:
            description: 'Branch for YDB scripts and create_issues --branch (PR runs use the merged PR base ref)'
            required: false
            type: string
            default: main
        build_type:
            description: 'Build type for mute file resolving (default: relwithdebinfo)'
            required: false
            type: string
            default: relwithdebinfo

env:
  GH_TOKEN: ${{ secrets.YDBOT_TOKEN }}
  DEFAULT_BUILD_TYPE: relwithdebinfo
  WORKFLOW_CHECKOUT_REF: ${{ github.ref_name }}

jobs:
  create-issues-for-muted-tests:
    runs-on: ubuntu-latest
    if: |
      ((github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'mute-unmute')) ||
       github.event_name == 'workflow_dispatch')

    steps:
      - name: Set environment variables for branches
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BASE_BRANCH=${{ github.event.inputs.base_branch }}" >> "$GITHUB_ENV"
            echo "BUILD_TYPE=${{ github.event.inputs.build_type || env.DEFAULT_BUILD_TYPE }}" >> "$GITHUB_ENV"
          else
            echo "BASE_BRANCH=${{ github.event.pull_request.base.ref || github.base_ref || 'main' }}" >> "$GITHUB_ENV"
            echo "BUILD_TYPE=${{ env.DEFAULT_BUILD_TYPE }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
            ref: ${{ env.WORKFLOW_CHECKOUT_REF }}

      - name: Resolve muted YA file path
        run: |
          MUTED_YA_RELATIVE="$(python3 .github/scripts/tests/mute/mute_helper.py resolve-path --preset "${{ env.BUILD_TYPE }}")"
          echo "MUTED_YA_FILE_PATH=${{ github.workspace }}/$MUTED_YA_RELATIVE" >> "$GITHUB_ENV"
          echo "Using build_type=${{ env.BUILD_TYPE }} muted_ya_file=$MUTED_YA_RELATIVE"

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install ydb[yc] PyGithub requests matplotlib numpy pandas

      - name: Setup ydb access
        uses: ./.github/actions/setup_ci_ydb_service_account_key_file_credentials
        with:
            ci_ydb_service_account_key_file_credentials: ${{ secrets.CI_YDB_SERVICE_ACCOUNT_KEY_FILE_CREDENTIALS }}

      - name: Create issues for muted tests
        id: create_issues
        env:
          GITHUB_TOKEN: ${{ env.GH_TOKEN }}
        run: .github/scripts/tests/mute/create_new_muted_ya.py create_issues --file_path="${{ env.MUTED_YA_FILE_PATH }}" --branch=${{ env.BASE_BRANCH }} --build-type=${{ env.BUILD_TYPE }}

      - name: Add issues to PR
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ env.GH_TOKEN }}
        run: python .github/scripts/create_or_update_pr.py append_pr_body --pr_number=${{ github.event.pull_request.number || github.event.inputs.pr_number  }} --body=${{ steps.create_issues.outputs.created_issues_file }}

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const workflowUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const filePath = '${{ steps.create_issues.outputs.created_issues_file }}';
            const bodyText = fs.readFileSync(filePath, 'utf8');
            const completeBody = `Collected in workflow [#${{ github.run_number }}](${workflowUrl})\n\n${bodyText}`;

            github.rest.issues.createComment({
              issue_number: ${{ github.event.pull_request.number || github.event.inputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: completeBody
            });

      - name: Update muted tests in DB
        run: python3 .github/scripts/tests/mute/get_muted_tests.py upload_muted_tests --branch=${{ env.BASE_BRANCH }} --build_type=${{ env.BUILD_TYPE }}

      - name: Collect test history data
        run: python3 .github/scripts/analytics/flaky_tests_history.py --branch=${{ env.BASE_BRANCH }} --build_type=${{ env.BUILD_TYPE }}

      - name: Update test monitor
        run: python3 .github/scripts/analytics/tests_monitor.py --branch=${{ env.BASE_BRANCH }} --build_type=${{ env.BUILD_TYPE }}

      # Issue export, mapping, and muted mart are handled by collect_analytics_fast (every 30 min)
