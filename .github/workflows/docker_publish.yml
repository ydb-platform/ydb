name: Publish docker image

on:
  schedule:
    - cron: "0 3 * * *"  # At 03:00 every day
  workflow_dispatch:
    inputs:
      ydbd_git_ref:
        type: string
        required: true
        default: main
        description: "Git branch/tag revision to build ydbd"
      cli_git_ref:
        type: string
        required: true
        default: main
        description: "Git branch/tag revision to build CLI"
      local_ydb_git_ref:
        type: string
        required: true
        default: main
        description: "Git branch/tag revision to build local_ydb binary"
      dockerfile_branch:
        type: string
        required: true
        default: main
        description: "Git branch for getting Dockerfile"
      image_tag:
        type: string
        required: true
        default: trunk
        description: "docker image tag"
jobs:
  build:
    runs-on: [self-hosted, auto-provisioned]
    steps:
      - name: Show run parameters
        env:
          INPUTS_JSON: ${{ toJson(inputs) }}
        run: |
          {
            echo "## Run parameters"
            echo ""
            echo "Event: \`${{ github.event_name }}\`"
            echo ""
            if [ -z "${INPUTS_JSON:-}" ] || [ "$INPUTS_JSON" = "null" ] || [ "$INPUTS_JSON" = "{}" ]; then
              echo "No explicit inputs (scheduled run uses workflow defaults)."
            else
              echo '```json'
              printf '%s\n' "$INPUTS_JSON" | jq .
              echo '```'
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Checkout .github
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dockerfile_branch || 'main' }}
          path: main
          sparse-checkout: |
            .github

      - name: Checkout repository for build ydbd
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ydbd_git_ref || 'main' }}
          path: ydbd

      - name: get revision for ydbd
        shell: bash
        id: get-sha
        working-directory: ydbd
        run: |
          echo "SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Checkout repository for build CLI
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.cli_git_ref || 'main' }}
          path: cli

      - name: Checkout repository for build local_ydb binary
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.local_ydb_git_ref || 'main' }}
          path: local_ydb

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the Docker Hub
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          username: ${{ vars.DOCKER_HUB_USER_NAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/local-ydb
            ${{ vars.DOCKER_HUB_REPOSITORY && vars.DOCKER_HUB_REPOSITORY || '' }}
          labels: |
            ydb.revision=${{ steps.get-sha.outputs.SHA }}
            org.opencontainers.image.revision=${{ steps.get-sha.outputs.SHA }}
          tags: |
            type=schedule,pattern=nightly
            type=raw,value=${{ inputs.image_tag || 'trunk' }}

      - name: Build docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: main/.github/docker/Dockerfile
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          cache-from: type=s3,name=local_ydb,region=ru-central1,bucket=${{ vars.AWS_BUCKET }},endpoint_url=${{ vars.AWS_ENDPOINT }},access_key_id=${{ secrets.AWS_KEY_ID }},secret_access_key=${{ secrets.AWS_KEY_VALUE }}
          cache-to: type=s3,name=local_ydb,region=ru-central1,bucket=${{ vars.AWS_BUCKET }},endpoint_url=${{ vars.AWS_ENDPOINT }},access_key_id=${{ secrets.AWS_KEY_ID }},secret_access_key=${{ secrets.AWS_KEY_VALUE }},mode=max

      - name: Test docker image
        continue-on-error: false
        run: |
          docker run -d --name local-ydb-test ghcr.io/${{ github.repository_owner }}/local-ydb:${{ inputs.image_tag || 'trunk' }}
          sleep 61  # Wait for the health check to run (--start-period=60s --interval=1s)
          if [ "$(docker inspect --format='{{json .State.Health.Status}}' local-ydb-test)" != "\"healthy\"" ]; then
            echo "Container is not healthy"
            docker inspect --format='{{json .State.Health}}' local-ydb-test
            docker logs local-ydb-test
            docker rm -f local-ydb-test
            exit 1
          fi
          docker stop local-ydb-test || true
          docker rm -f local-ydb-test || true

      - name: Push docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: main/.github/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          cache-from: type=s3,name=local_ydb,region=ru-central1,bucket=${{ vars.AWS_BUCKET }},endpoint_url=${{ vars.AWS_ENDPOINT }},access_key_id=${{ secrets.AWS_KEY_ID }},secret_access_key=${{ secrets.AWS_KEY_VALUE }}
          cache-to: type=s3,name=local_ydb,region=ru-central1,bucket=${{ vars.AWS_BUCKET }},endpoint_url=${{ vars.AWS_ENDPOINT }},access_key_id=${{ secrets.AWS_KEY_ID }},secret_access_key=${{ secrets.AWS_KEY_VALUE }},mode=max

  notify-failure:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout CODEOWNERS and scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/CODEOWNERS
            .github/scripts/resolve_codeowners.py
            .github/scripts/notify_workflow_failure.sh
          sparse-checkout-cone-mode: false

      - name: Install codeowners resolver
        run: pip install codeowners

      - name: Resolve owners for this workflow
        id: owners
        run: |
          OWNERS=$(python3 .github/scripts/resolve_codeowners.py .github/workflows/docker_publish.yml | paste -sd ' ' -)
          echo "owners=${OWNERS:-@ydb-platform/appteam}" >> "$GITHUB_OUTPUT"
          echo "Resolved owners: ${OWNERS:-@ydb-platform/appteam (fallback)}"

      - name: Open or update failure issue
        env:
          GH_TOKEN: ${{ secrets.YDBOT_TOKEN }}
        run: |
          bash .github/scripts/notify_workflow_failure.sh \
            "docker-publish-fail" \
            "docker_publish.yml workflow is failing" \
            "${{ steps.owners.outputs.owners }}"
