name: Build documentation

on:
  pull_request_target:
    paths: 
    - 'ydb/docs/**'
  workflow_dispatch:
    inputs:
      pull_number:
        description: 'Pull Request number to build documentation'
        required: true
        type: string

jobs:
  add-label:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Add documentation label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['documentation']
            })
            
  build-docs:
    needs: add-label
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || 
       (github.event_name == 'pull_request_target' && 
        github.event.pull_request.state == 'open' &&
        needs.add-label.result == 'success'))
    concurrency:
      group: docs-build-${{ github.event_name == 'workflow_dispatch' && inputs.pull_number || github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', inputs.pull_number) || github.event.pull_request.head.sha }}

      - name: Get commit SHA for manual run
        if: github.event_name == 'workflow_dispatch'
        run: echo "CHECKOUT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Build
        uses: diplodoc-platform/docs-build-action@v3
        with:
          revision: "pr-${{ github.event_name == 'workflow_dispatch' && inputs.pull_number || github.event.pull_request.number }}-${{ github.event_name == 'workflow_dispatch' && env.CHECKOUT_SHA || github.event.pull_request.head.sha }}"
          src-root: "./ydb/docs"
          cli-version: stable
