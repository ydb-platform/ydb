name: Rebuild documentation

# SECURITY: triggered by `pull_request_target` (privileged) when a maintainer
# applies the `rebuild_docs` label. The workflow is split into independent
# jobs so that the GITHUB_TOKEN seen by PR-controlled code (in `build-docs`)
# is read-only and the label-management job runs separately with narrowly
# scoped `pull-requests: write`. No secrets are exposed to the build job.

on:
  pull_request_target:
    types: [labeled]

jobs:
  remove-label:
    if: github.event.label.name == 'rebuild_docs'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove rebuild_docs label
        uses: actions/github-script@v8
        with:
          script: |
            // Always clear trigger label so manual re-run is a single re-add.
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'rebuild_docs',
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

  check-docs-changes:
    if: |
      github.event.label.name == 'rebuild_docs' &&
      github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      has_docs: ${{ steps.docs-changes.outputs.has_docs }}
    steps:
      - name: Check PR has docs changes
        id: docs-changes
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const hasDocs = files.some((f) => f.filename.startsWith('ydb/docs/'));
            core.setOutput('has_docs', hasDocs ? 'true' : 'false');

  build-docs:
    needs: check-docs-changes
    if: needs.check-docs-changes.outputs.has_docs == 'true'
    concurrency:
      group: docs-build-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get commit SHA
        id: sha
        run: echo "value=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Build
        uses: diplodoc-platform/docs-build-action@v3
        with:
          revision: "pr-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.value }}"
          src-root: "./ydb/docs"
          cli-version: stable
