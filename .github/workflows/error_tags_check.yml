name: Error-tags-check

on:
  pull_request:
    branches:
      - main
      - stable-*
    paths:
      - 'ydb/**'
      - '.github/workflows/error_tags_check.yml'
  workflow_dispatch: {}

jobs:
  validate-error-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate YDBE-XXXXX error tags
        run: python3 ydb/library/error_tags/validate_error_tags.py
