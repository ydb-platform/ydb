name: Postcommits gate
on:
  schedule:
    - cron: "*/5 * * * *"  # Every 5 minutes
  workflow_dispatch:

jobs:
  switch_gate:
    runs-on: ubuntu-latest
    name: SwitchGate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run postcommits gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          POSTCOMMIT_GATE_CONFIG: ${{ vars.POSTCOMMIT_GATE_CONFIG }}
          POSTCOMMIT_QUEUE_THRESHOLD: ${{ vars.POSTCOMMIT_QUEUE_THRESHOLD }}
          GATE_REPORT_DIR: ${{ runner.temp }}/gate-report
        run: python3 .github/scripts/gate_postcommits.py --report-dir "$GATE_REPORT_DIR"

      - name: Upload gate report
        uses: actions/upload-artifact@v4
        with:
          name: postcommits-gate-report
          path: ${{ runner.temp }}/gate-report/
          if-no-files-found: error
          retention-days: 14
