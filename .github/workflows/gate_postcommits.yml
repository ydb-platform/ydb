name: Postcommits gate
on:
  schedule:
    - cron: "*/5 * * * *"  # Every 5 minutes
  workflow_dispatch:

jobs:
  switch_gate:
    runs-on: ubuntu-latest
    name: SwitchGate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run postcommits gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          POSTCOMMIT_GATE_CONFIG: ${{ vars.POSTCOMMIT_GATE_CONFIG }}
          POSTCOMMIT_QUEUE_THRESHOLD: ${{ vars.POSTCOMMIT_QUEUE_THRESHOLD }}
          GATE_REPORT_DIR: ${{ runner.temp }}/gate-report
          GATE_REPORT_URL: ${{ vars.AWS_ENDPOINT }}/tmp-ydb-bucket/postcommits-gate/index.html
        run: python3 .github/scripts/gate_postcommits.py --report-dir "$GATE_REPORT_DIR"

      - name: Set up s3cmd
        uses: s3-actions/s3cmd@v1.6.1

      - name: Prepare s3cmd
        uses: ./.github/actions/s3cmd
        with:
          s3_key_id: ${{ secrets.AWS_KEY_ID }}
          s3_key_secret: ${{ secrets.AWS_KEY_VALUE }}
          s3_endpoint: ${{ vars.AWS_ENDPOINT }}

      - name: Upload gate report to S3
        env:
          GATE_REPORT_DIR: ${{ runner.temp }}/gate-report
        run: |
          set -euo pipefail
          S3_BUCKET_PATH=s3://tmp-ydb-bucket/postcommits-gate
          s3cmd sync --follow-symlinks --acl-public --no-progress --stats --no-mime-magic --guess-mime-type --no-check-md5 "$GATE_REPORT_DIR/" "$S3_BUCKET_PATH/"
