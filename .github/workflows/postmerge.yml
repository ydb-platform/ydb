# Mainline checks when main, stable-*, or stream-nb-* advance (e.g. after merge).
name: Postmerge

on:
  push:
    branches:
      - 'main'
      - 'stable-*'
      - 'stream-nb-*'
    paths-ignore:
      - 'ydb/docs/**'

jobs:
  build_and_test:
    uses: ./.github/workflows/ya_ci_standard_matrix.yml
    with:
      include_postcommit_runner: true
      checks_switch_mode: postmerge
    secrets: inherit
