name: Regression-run_Small_and_Medium

on:
  schedule:
    - cron: "30 23 * * *"  # At 23:30 every day
  workflow_dispatch:
    inputs:
      pull_request_input:
        description: 'Pull request number (overrides use_default_branches), ex: 12345'
        required: false
        default: ''
      use_default_branches:
        description: 'If true, start main and all current stable branches. If false, start only the selected branch. Ignored if pull_request_input is set.'
        type: boolean
        required: false
        default: true

jobs:
  main:
    name: Regression-run_Small_and_Medium
    uses: ./.github/workflows/run_tests.yml
    secrets: inherit
    with:
      test_targets: ydb/
      test_size: small,medium
      config_path: '.github/config/stable_tests_branches.json'
      workflow_presets: '["relwithdebinfo", "release-asan", "release-tsan", "release-msan"]'
      branches: ${{ inputs.pull_request_input && format('pull/{0}', inputs.pull_request_input) || (inputs.use_default_branches == false && github.ref_name || '') }}
