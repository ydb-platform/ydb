name: Run and debug tests

on:
  workflow_dispatch:
    inputs:
      test_targets:
        description: 'Paths to tests (e.g., "ydb/tests/olap/" or "ydb/tests/olap/, ydb/tests/functional/")'
        required: false
        type: string
        default: 'ydb/tests/olap/'
      build_preset:
        description: 'Build preset types (comma-separated: "relwithdebinfo, release-asan" or single: "relwithdebinfo")'
        required: false
        type: string
        default: 'relwithdebinfo, release-asan'
      branches:
        description: 'Branches to test (comma-separated: "main, stable-25-3" or JSON array: ["main", "stable-25-3"], empty = use branches from config)'
        required: false
        type: string
        default: ''
      use_branches_config:
        description: 'If true, use branches from .github/config/stable_tests_branches.json'
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      branches_json: ${{ steps.format-inputs.outputs.branches_json }}
      presets_json: ${{ steps.format-inputs.outputs.presets_json }}
    steps:
      - name: Checkout config
        if: ${{ inputs.use_branches_config && inputs.branches == '' }}
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/config

      - name: Format inputs
        id: format-inputs
        run: |
          # Format branches
          if [ -z "${{ inputs.branches }}" ] && [ "${{ inputs.use_branches_config }}" = "true" ]; then
            branches_json=$(jq -c '[.branches | keys_unsorted[]]' .github/config/stable_tests_branches.json)
            echo "branches_json=$branches_json" >> $GITHUB_OUTPUT
          elif [ -z "${{ inputs.branches }}" ]; then
            echo "branches_json=" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.branches }}" == \[* ]]; then
            echo "branches_json=${{ inputs.branches }}" >> $GITHUB_OUTPUT
          else
            IFS=',' read -ra BRANCHES <<< "${{ inputs.branches }}"
            JSON_BRANCHES="["
            FIRST=true
            for branch in "${BRANCHES[@]}"; do
              branch=$(echo "$branch" | xargs)
              if [ -n "$branch" ]; then
                if [ "$FIRST" = true ]; then FIRST=false; else JSON_BRANCHES+=", "; fi
                JSON_BRANCHES+="\"$branch\""
              fi
            done
            JSON_BRANCHES+="]"
            echo "branches_json=$JSON_BRANCHES" >> $GITHUB_OUTPUT
          fi

          # Format presets
          BUILD_PRESET_INPUT="${{ inputs.build_preset }}"
          if [ -z "$BUILD_PRESET_INPUT" ]; then
            BUILD_PRESET_INPUT="relwithdebinfo"
          fi
          if [[ "$BUILD_PRESET_INPUT" == \[* ]]; then
            echo "presets_json=$BUILD_PRESET_INPUT" >> $GITHUB_OUTPUT
          else
            IFS=',' read -ra PRESETS <<< "$BUILD_PRESET_INPUT"
            JSON_PRESETS="["
            FIRST=true
            for preset in "${PRESETS[@]}"; do
              preset=$(echo "$preset" | xargs)
              if [ -n "$preset" ]; then
                if [ "$FIRST" = true ]; then FIRST=false; else JSON_PRESETS+=", "; fi
                JSON_PRESETS+="\"$preset\""
              fi
            done
            JSON_PRESETS+="]"
            echo "presets_json=$JSON_PRESETS" >> $GITHUB_OUTPUT
          fi

  main:
    name: Run and debug tests
    needs: prepare
    uses: ./.github/workflows/run_tests.yml
    secrets: inherit
    with:
      test_targets: ${{ inputs.test_targets }}
      test_size: small,medium
      workflow_presets: ${{ needs.prepare.outputs.presets_json }}
      branches: ${{ needs.prepare.outputs.branches_json || '' }}

  collect_combined_summary:
    needs: main
    if: always()
    uses: ./.github/workflows/collect_combined_summary.yml
