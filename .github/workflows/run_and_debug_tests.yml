# TEMPORARY smoke harness for #45008; revert before merge.
name: Postcommit
on:
  push:
    branches:
      - 'ci-test-*'
    paths-ignore:
      - 'ydb/docs/**'
  workflow_dispatch:
env:
  CI_SECS: ${{ format('{{"AWS_KEY_ID":"{0}","AWS_KEY_VALUE":"{1}","REMOTE_CACHE_USERNAME":"{2}","REMOTE_CACHE_PASSWORD":"{3}","YDBOT_TELEGRAM_BOT_TOKEN":"{4}"}}',
    secrets.AWS_KEY_ID, secrets.AWS_KEY_VALUE, secrets.REMOTE_CACHE_USERNAME, secrets.REMOTE_CACHE_PASSWORD, secrets.YDBOT_TELEGRAM_BOT_TOKEN ) }}
  CI_VARS: ${{ format('{{"AWS_BUCKET":"{0}","AWS_ENDPOINT":"{1}","REMOTE_CACHE_URL":"{2}","GH_ALERTS_TG_LOGINS":"{3}","GH_ALERTS_TG_CHAT":"{4}"}}',
    vars.AWS_BUCKET, vars.AWS_ENDPOINT, vars.REMOTE_CACHE_URL_YA, vars.GH_ALERTS_TG_LOGINS, vars.GH_ALERTS_TG_CHAT ) }}
jobs:
  build_and_test:
    if: >-
      vars.CHECKS_SWITCH != ''
      && (fromJSON(vars.CHECKS_SWITCH).postcommit_relwithdebinfo == true
          || fromJSON(vars.CHECKS_SWITCH).postcommit_asan == true)
    strategy:
      fail-fast: false
      matrix:
        build_preset: [relwithdebinfo, release-asan]
    name: Build and test ${{ matrix.build_preset }}
    runs-on: [ self-hosted, auto-provisioned, "${{ format('build-preset-{0}', matrix.build_preset) }}", postcommit ]
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 2
    - name: Build and test
      if: >-
        (matrix.build_preset == 'relwithdebinfo' && fromJSON(vars.CHECKS_SWITCH).postcommit_relwithdebinfo == true)
        || (matrix.build_preset == 'release-asan' && fromJSON(vars.CHECKS_SWITCH).postcommit_asan == true)
      uses: ./.github/actions/build_and_test_ya
      with:
        build_preset: ${{ matrix.build_preset }}
        increment: true
        ci_ydb_service_account_key_file_credentials: ${{ secrets.CI_YDB_SERVICE_ACCOUNT_KEY_FILE_CREDENTIALS }}
        ydb_qa_config: ${{ vars.YDB_QA_CONFIG }}
        secs: ${{ env.CI_SECS }}
        vars: ${{ env.CI_VARS }}
