name: Run-tests

on:
  workflow_call:
    inputs:
      test_targets:
        description: 'Paths to tests for run ,example : ydb/ ydb/tests/func/suite'
        required: true
        type: string
        default: ydb/
      test_type:
        description: 'Test type (empty = all types: unittest,py3test,py2test,pytest,gtest)'
        required: false
        type: string
        default: ''
      test_size:
        description: 'Test size: small, medium, large (default: small,medium,large)'
        required: false
        type: string
        default: small,medium,large
      additional_ya_make_args:
        description: 'additional args for ya make'
        required: false
        type: string
        default: ''
      build_preset:
        description: 'Build preset type'
        required: true
        type: string
      branches:
        description: 'Branches to test (JSON array or single branch)'
        required: false
        type: string
        default: '["main"]'
      branches_config_path:
        description: 'Path to JSON file with branches to test'
        required: false
        type: string
        default: ''
      blacklist_paths:
        description: 'Newline-separated list of paths or patterns to blacklist; provide all required paths/patterns explicitly'
        required: false
        type: string
        default: ''
      test_threads:
        description: 'Test threads count (default: 52; build presets use a fraction of this value)'
        required: false
        type: string
        default: '52'

  workflow_dispatch:
    inputs:
      pull_number:
        description: 'Pull request number, ex: 12345'
        required: false
        default: ''
      test_targets:
        description: 'Paths to tests for run ,example : ydb/ ydb/tests/func/suite'
        required: true
        default: ydb/
      test_type:
        description: 'Test type (empty = all types: unittest,py3test,py2test,pytest,gtest)'
        required: false
        default: ''
      test_size:
        description: 'Test size: small, medium, large (default: small,medium)'
        required: false
        type: choice
        default: small,medium
        options:
          - small
          - medium
          - large
          - small,medium
          - small,medium,large
      additional_ya_make_args:
        description: 'additional args for ya make'
        required: false
        default: ''
      build_preset:
        description: 'Build preset type (relwithdebinfo, release-asan, release-msan, release-tsan)'
        required: true
        type: choice
        options:
          - relwithdebinfo
          - release-asan
          - release-msan
          - release-tsan
        default: relwithdebinfo
      collect_coredumps:
        type: boolean
        default: false
        description: "Collect coredumps via ulimit -c unlimited"
      test_threads:
        description: 'Test threads count (default: 52; build presets use a fraction of this value)'
        required: false
        default: '52'
      branches:
        description: 'Branches to test (JSON array or single branch)'
        required: false
        default: ''
      branches_config_path:
        description: 'Path to JSON file with branches to test'
        required: false
        default: ''
      blacklist_paths:
        description: 'Newline-separated paths or patterns to blacklist'
        required: false
        default: ''

jobs:
  run_tests:
    uses: ./.github/workflows/run_tests_core.yml
    with:
      test_targets: ${{ inputs.test_targets }}
      test_type: ${{ inputs.test_type }}
      test_size: ${{ inputs.test_size }}
      additional_ya_make_args: ${{ inputs.additional_ya_make_args }}
      build_preset: ${{ inputs.build_preset }}
      branches: ${{ inputs.branches }}
      branches_config_path: ${{ inputs.branches_config_path }}
      blacklist_paths: ${{ inputs.blacklist_paths }}
      test_threads: ${{ inputs.test_threads }}
      pull_number: ${{ inputs.pull_number }}
      collect_coredumps: ${{ inputs.collect_coredumps }}
    secrets: inherit
