# Shared build+test path for PR-check and postcommit workflows.
# Keep presets, cache secrets, and ya args aligned here only.
name: Ya CI core (build and test)

on:
  workflow_call:
    inputs:
      build_preset:
        required: true
        type: string
      checkout_ref:
        required: false
        type: string
        default: ''
        description: 'Git ref for actions/checkout; empty uses github.sha of the triggering run'
      runner_extra_label:
        required: false
        type: string
        default: ''
        description: 'Optional self-hosted label (e.g. postcommit)'
      fetch_depth:
        required: false
        type: number
        default: 2
      test_threads:
        required: false
        type: string
        default: '52'
      test_size:
        required: false
        type: string
        default: 'small,medium'
      build_target:
        required: false
        type: string
        default: 'ydb/'
      increment:
        required: false
        type: boolean
        default: true
      run_tests:
        required: false
        type: boolean
        default: true
      additional_ya_make_args:
        required: false
        type: string
        default: '-DDEBUGINFO_LINES_ONLY'

jobs:
  ya_ci_check:
    name: Build and test ${{ inputs.build_preset }}
    runs-on: ${{ inputs.runner_extra_label != '' && fromJSON(format('["self-hosted","auto-provisioned","build-preset-{0}","{1}"]', inputs.build_preset, inputs.runner_extra_label)) || fromJSON(format('["self-hosted","auto-provisioned","build-preset-{0}"]', inputs.build_preset)) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          fetch-depth: ${{ inputs.fetch_depth }}
      - name: Setup ydb access
        uses: ./.github/actions/setup_ci_ydb_service_account_key_file_credentials
        with:
          ci_ydb_service_account_key_file_credentials: ${{ secrets.CI_YDB_SERVICE_ACCOUNT_KEY_FILE_CREDENTIALS }}
      - name: Build and test
        uses: ./.github/actions/build_and_test_ya
        with:
          build_preset: ${{ inputs.build_preset }}
          build_target: ${{ inputs.build_target }}
          increment: ${{ inputs.increment }}
          run_tests: ${{ inputs.run_tests }}
          test_size: ${{ inputs.test_size }}
          test_threads: ${{ inputs.test_threads }}
          put_build_results_to_cache: true
          additional_ya_make_args: ${{ inputs.additional_ya_make_args }}
          secs: ${{ format('{{"AWS_KEY_ID":"{0}","AWS_KEY_VALUE":"{1}","REMOTE_CACHE_USERNAME":"{2}","REMOTE_CACHE_PASSWORD":"{3}","TELEGRAM_YDBOT_TOKEN":"{4}"}}',
            secrets.AWS_KEY_ID, secrets.AWS_KEY_VALUE, secrets.REMOTE_CACHE_USERNAME, secrets.REMOTE_CACHE_PASSWORD, secrets.TELEGRAM_YDBOT_TOKEN ) }}
          vars: ${{ format('{{"AWS_BUCKET":"{0}","AWS_ENDPOINT":"{1}","REMOTE_CACHE_URL":"{2}","GH_ALERTS_TG_LOGINS":"{3}","GH_ALERTS_TG_CHAT":"{4}"}}',
            vars.AWS_BUCKET, vars.AWS_ENDPOINT, vars.REMOTE_CACHE_URL_YA, vars.GH_ALERTS_TG_LOGINS, vars.GH_ALERTS_TG_CHAT ) }}
