# doc_verify на translation PR (ветка в upstream или в fork).
# QA = тот же пайплайн, что после doc_translate (@v0.1.0).

name: ydbdoc-review (doc_verify label)

on:
  pull_request_target:
    types: [labeled]
    paths:
      - "ydb/docs/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  ydbdoc-verify:
    if: github.event.label.name == 'doc_verify'
    runs-on: ubuntu-latest
    concurrency:
      group: ydbdoc-verify-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch merge base ref
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Verify translation PR
        uses: ydb-platform/ydbdoc-review@v0.1.0
        with:
          mode: verify
          repo: ${{ github.repository }}
          pr: ${{ github.event.pull_request.number }}
          merge_base_with: origin/${{ github.event.pull_request.base.ref }}
        env:
          YANDEX_CLOUD_FOLDER_DOC_REVIEW: ${{ secrets.YANDEX_CLOUD_FOLDER_DOC_REVIEW }}
          YANDEX_CLOUD_API_KEY_DOC_REVIEW: ${{ secrets.YANDEX_CLOUD_API_KEY_DOC_REVIEW }}
          YDBDOC_REPO_PATH: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-verify-ci:
    needs: ydbdoc-verify
    if: ${{ !cancelled() && needs.ydbdoc-verify.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger PR-check and docs build on translation PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.YDBOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: ['ok-to-test'],
            });
            core.info(`Added ok-to-test to translation PR #${prNumber}`);

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'docs_build.yaml',
              ref: context.payload.repository.default_branch,
              inputs: {
                pull_number: String(prNumber),
              },
            });
            core.info(`Dispatched Build documentation for translation PR #${prNumber}`);
