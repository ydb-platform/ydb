# Проверка translation PR: лейбл doc_verify (ветка ydbdoc-review/pr-*).
# RU и EN с head ветки PR; тот же QA, что в конце doc_translate (@v0.1.0):
# сегментный критик → apply suggested_text → verify pass → эвристики.
# Без нового перевода. Repair-коммит в ветку PR — по умолчанию включён.

name: ydbdoc-review (doc_verify label)

on:
  pull_request_target:
    types: [labeled]
    paths:
      - "ydb/docs/**"

permissions:
  contents: write
  pull-requests: write
  issues: write   # комментарий с отчётом в PR

jobs:
  ydbdoc-verify:
    if: github.event.label.name == 'doc_verify'
    runs-on: ubuntu-latest
    concurrency:
      group: ydbdoc-verify-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch merge base ref
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Verify translation PR
        uses: ydb-platform/ydbdoc-review@v0.1.0
        with:
          mode: verify
          repo: ${{ github.repository }}
          pr: ${{ github.event.pull_request.number }}
          merge_base_with: origin/${{ github.event.pull_request.base.ref }}
          # no_commit: "true"   # только отчёт, без repair commit/push
          # dry_run: "true"     # без записи на диск и без комментария
        env:
          YANDEX_CLOUD_FOLDER_DOC_REVIEW: ${{ secrets.YANDEX_CLOUD_FOLDER_DOC_REVIEW }}
          YANDEX_CLOUD_API_KEY_DOC_REVIEW: ${{ secrets.YANDEX_CLOUD_API_KEY_DOC_REVIEW }}
          YDBDOC_REVIEW_ENABLED: ${{ vars.YDBDOC_REVIEW_ENABLED }}
          YDBDOC_MODEL_CHECK: ${{ vars.YDBDOC_MODEL_CHECK }}
          YDBDOC_REPO_PATH: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
