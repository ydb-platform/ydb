TS_PACKAGE_CMD=${_TS_PROJECT_SETUP_CMD} \
    && ${TS_LIBRARY_CMD_BASE} \
    ${hide;kv:"pc magenta"} ${hide;kv:"p TS_PKG"}

### @usage: TS_PACKAGE()
###
### The TypeScript/JavaScript library module, that does not need any compilation,
### and is just a set of files and NPM dependencies. List required files in TS_FILES macro.
### `package.json` is included by default.
###
### Documentation: https://docs.yandex-team.ru/frontend-in-arcadia/references/TS_PACKAGE
###
multimodule TS_PACKAGE {
    module BUILD: _TS_BASE_UNIT {
        .CMD=$TS_PACKAGE_CMD
        .SEM=$_SEM_IGNORED
        .EPILOGUE=_TS_LIBRARY_EPILOGUE
        .PEERDIRSELF=TS_PREPARE_DEPS
        .ALIASES=RUN_JAVASCRIPT_AFTER_BUILD=_FORBID_PKG_RUN_JAVASCRIPT_AFTER_BUILD

        # by default multimodule overrides inherited MODULE_TAG to submodule name (BUILD in this case)
        # but we have to set it to TS for include processor to work
        SET(MODULE_TAG TS)

        # flag TS_PACKAGE for on_ts_library_configure
        ENABLE(_TS_PACKAGE)

        # set different command name for TS_LIBRARY_CMD_BASE
        SET(_NOTS_TOOL_BUILD_LIBRARY_CMD build-package)

        DISABLE(TS_CONFIG_DEDUCE_OUT)
        SET_APPEND(_MAKEFILE_INCLUDE_LIKE_DEPS ${CURDIR}/package.json)
    }

    module TS_PREPARE_DEPS: _PREPARE_DEPS_BASE {
    }
}



########################################################

macro _FORBID_PKG_RUN_JAVASCRIPT_AFTER_BUILD() {
    _L1 = {COLORS.cyan}TS_PACKAGE{COLORS.reset} does not support {COLORS.cyan}RUN_JAVASCRIPT_AFTER_BUILD{COLORS.reset}
    _L2 = Switch to {COLORS.cyan}TS_LIBRARY{COLORS.reset} instead
    _L3 = https://docs.yandex-team.ru/frontend-in-arcadia/references/TS_LIBRARY
    _TS_CONF_ERROR(\n$_L1\n$_L2\n$_L3)
}

