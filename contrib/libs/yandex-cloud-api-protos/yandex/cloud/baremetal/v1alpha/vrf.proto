syntax = "proto3";

package yandex.cloud.baremetal.v1alpha;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v1alpha;baremetal";
option java_package = "yandex.cloud.api.baremetal.v1alpha";

message Vrf {
  // Reserved for future use.
  reserved 8 to 99, 101 to 199;

  // ID of the VRF.
  string id = 1;

  // ID of the cloud that the private subnet belongs to.
  string cloud_id = 2;

  // ID of the folder that the private subnet belongs to.
  string folder_id = 3;

  // Name of the VRF.
  // The name is unique within the folder.
  string name = 4;

  // Optional description of the VRF.
  string description = 5;

  // Status of the VRF.  
  Status status = 6;

  // Static routes.
  repeated StaticRoute static_routes = 7;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 100;

  // Resource labels as `key:value` pairs.
  map<string, string> labels = 200;

  enum Status {
    // Unspecified VRF status.
    STATUS_UNSPECIFIED = 0;

    // VRF is ready to use.
    ACTIVE = 1;

    // VRF is being updated.
    UPDATING = 2;
  }
}

message StaticRoute {
  // Destination network CIDR block.
  string destination_cidr = 1;

  // Next hop host IP address.
  string next_hop_ip_address = 2;

  // Redistribution type.
  RedistributionType redistribution_type = 3;

  enum RedistributionType {
    // Unspecified redistribution type.
    REDISTRIBUTION_TYPE_UNSPECIFIED = 0;

    // Static route announcements outside BareMetal VRF disabled.
    DISABLED = 1;

    // Static route announcements outside BareMetal VRF enabled.
    ENABLED = 2;
  }
}
