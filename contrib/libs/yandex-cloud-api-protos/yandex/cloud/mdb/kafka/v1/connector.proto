syntax = "proto3";

package yandex.cloud.mdb.kafka.v1;

import "google/protobuf/wrappers.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/mdb/kafka/v1;kafka";
option java_package = "yandex.cloud.api.mdb.kafka.v1";

// An object that represents an Apache Kafka® connector.
//
// See [the documentation](/docs/managed-kafka/concepts/connectors) for details.
message ConnectorSpec {
  reserved 4 to 9;
  // Name of the connector.
  string name = 1;

  // Maximum number of connector tasks. Default value is the number of brokers.
  google.protobuf.Int64Value tasks_max = 2;

  // A set of properties passed to Managed Service for Apache Kafka® with the connector configuration.
  // Example: `sync.topics.config.enabled: true`.
  map<string, string> properties = 3;

  // Additional settings for the connector.
  oneof connector_config {
    // Configuration of the MirrorMaker connector.
    ConnectorConfigMirrorMakerSpec connector_config_mirrormaker = 10;

    // Configuration of S3-Sink connector.
    ConnectorConfigS3SinkSpec connector_config_s3_sink = 11;

    // Configuration of Iceberg Sink connector.
    ConnectorConfigIcebergSinkSpec connector_config_iceberg_sink = 12;
  }
}

message UpdateConnectorSpec {
  reserved 3 to 9;
  // Maximum number of connector tasks to update.
  google.protobuf.Int64Value tasks_max = 1;

  // A set of new or changed properties to update for the connector. They are passed with the connector configuration to Managed Service for Apache Kafka®.
  // Example: `sync.topics.config.enabled: false`.
  map<string, string> properties = 2;

  // Updated configuration for the connector.
  oneof connector_config {
    // Configuration of the MirrorMaker connector.
    ConnectorConfigMirrorMakerSpec connector_config_mirrormaker = 10;

    // Update specification for S3-Sink Connector.
    UpdateConnectorConfigS3SinkSpec connector_config_s3_sink = 11;

    // Update specification for Iceberg Sink Connector.
    UpdateConnectorConfigIcebergSinkSpec connector_config_iceberg_sink = 12;
  }
}

message ConnectorConfigMirrorMakerSpec {
  // Source cluster configuration for the MirrorMaker connector.
  ClusterConnectionSpec source_cluster = 1;

  // Target cluster configuration for the MirrorMaker connector.
  ClusterConnectionSpec target_cluster = 2;

  // List of Kafka topics, separated by `,`.
  string topics = 3;

  // Replication factor for automatically created topics.
  google.protobuf.Int64Value replication_factor = 4;
}

message ClusterConnectionSpec {
  // Alias of cluster connection configuration.
  // Examples: `source`, `target`.
  string alias = 1;

  // Type of connection to Apache Kafka® cluster.
  oneof cluster_connection {
    // Connection configuration of the cluster the connector belongs to. As all credentials are already known, leave this parameter empty.
    ThisClusterSpec this_cluster = 2;

    // Configuration of connection to an external cluster with all the necessary credentials.
    ExternalClusterConnectionSpec external_cluster = 3;
  }
}

message ThisClusterSpec {}

message ExternalClusterConnectionSpec {
  // List of bootstrap servers of the cluster, separated by `,`.
  string bootstrap_servers = 1;

  // SASL username to use for connection to the cluster.
  string sasl_username = 2;

  // SASL password to use for connection to the cluster.
  string sasl_password = 3;

  // SASL mechanism to use for connection to the cluster.
  string sasl_mechanism = 4;

  // Security protocol to use for connection to the cluster.
  string security_protocol = 5;

  // CA in PEM format to connect to external cluster.
  // Lines of certificate separated by '\n' symbol.
  string ssl_truststore_certificates = 6;
}

// Specification for Kafka S3-Sink Connector.
message ConnectorConfigS3SinkSpec {
  // List of Kafka topics, separated by ','.
  string topics = 1;

  // The compression type used for files put on GCS.
  // The supported values are: `gzip`, `snappy`, `zstd`, `none`.
  // Optional, the default is `none`.
  string file_compression_type = 2;

  // Max records per file.
  google.protobuf.Int64Value file_max_records = 3;

  // Credentials for connecting to S3 storage.
  S3ConnectionSpec s3_connection = 4;
}

// Specification for update Kafka S3-Sink Connector.
message UpdateConnectorConfigS3SinkSpec {
  // List of Kafka topics, separated by ','.
  string topics = 1;

  // Max records per file.
  google.protobuf.Int64Value file_max_records = 2;

  // Credentials for connecting to S3 storage.
  S3ConnectionSpec s3_connection = 3;
}

// Specification for S3Connection -
// settings of connection to AWS-compatible S3 storage, that
// are source or target of Kafka S3-connectors.
// YC Object Storage is AWS-compatible.
message S3ConnectionSpec {
  // Name of the bucket.
  string bucket_name = 1;
  oneof storage {
    // Configuration for connection to S3 storage.
    ExternalS3StorageSpec external_s3 = 2;
  }
}

message ExternalS3StorageSpec {
  // ID of the AWS access key.
  string access_key_id = 1;
  // Secret access key for the AWS access key.
  string secret_access_key = 2;
  // S3 endpoint.
  string endpoint = 3;
  // AWS region. Default is 'us-east-1'.
  string region = 4;
}

// Specification for Kafka Iceberg Sink Connector.
message ConnectorConfigIcebergSinkSpec {
  reserved 5 to 6;
  oneof topics_source {
    // List of Kafka topics, separated by ','.
    string topics = 1;

    // Regex of Kafka topics.
    string topics_regex = 2;
  }

  // Credentials for connecting to Managed Hive Metastore.
  MetastoreConnectionSpec metastore_connection = 3;

  // Credentials for connecting to S3 storage.
  IcebergS3ConnectionSpec s3_connection = 4;


  // Table routing strategy
  oneof table_routing {
    // Static table routing
    StaticTablesSpec static_tables = 7;
    
    // Dynamic table routing
    DynamicTablesSpec dynamic_tables = 8;
  }

  // Optional table settings
  IcebergTablesConfigSpec tables_config = 9;

  // Optional control settings
  IcebergControlSpec control_config = 10;
}

// Specification for update Kafka Iceberg Sink Connector.
message UpdateConnectorConfigIcebergSinkSpec {
  oneof topics_source {
    // List of Kafka topics, separated by ','.
    string topics = 1;

    // Regex of Kafka topics.
    string topics_regex = 2;
  }

  // Credentials for connecting to Managed Hive Metastore.
  MetastoreConnectionSpec metastore_connection = 3;

  // Credentials for connecting to S3 storage.
  IcebergS3ConnectionSpec s3_connection = 4;

  // Optional table settings
  IcebergTablesConfigSpec tables_config = 5;

  // Optional control settings
  IcebergControlSpec control_config = 6;
}

message StaticTablesSpec {
  // List of tables, separated by ','.
  repeated string tables = 1;
}

message DynamicTablesSpec {
  // Field in the message to define the target table
  // The iceberg.tables.dynamic-enabled field is set to true
  string route_field = 1;
}


message MetastoreConnectionSpec {
  // Thrift URI of Hive Metastore
  // Format: "thrift://host:9083"
  string catalog_uri = 1;
  // Warehouse root directory in S3
  // Format: "s3a://bucket-name/path/to/warehouse"
  // Can be any path within the bucket, not necessarily "/warehouse"
  string warehouse = 2;
}

// Specification for IcebergS3Connection -
// settings of connection to AWS-compatible S3 storage, that
// are target of Kafka Iceberg-connectors.
// YC Object Storage is AWS-compatible.
message IcebergS3ConnectionSpec {
  oneof storage {
    // Configuration for connection to S3 storage.
    ExternalIcebergS3StorageSpec external_s3 = 1;
  }
}

message ExternalIcebergS3StorageSpec {
  // ID of the AWS access key.
  string access_key_id = 1;
  // Secret access key for the AWS access key.
  string secret_access_key = 2;
  // S3 endpoint.
  string endpoint = 3;
  // AWS region. Default is 'us-east-1'.
  string region = 4;
}

message IcebergTablesConfigSpec {

  // Default Git-like branch name for Iceberg commits.
  // Default: "main"
  string default_commit_branch = 1;

  // List of columns used as identifiers for upsert operations, separated by ','.
  string default_id_columns = 2;

  // Comma-separated list of columns or transform expressions for table partitioning.
  // Defines physical data layout for query optimization.
  // Examples:
  //   - "date"
  //   - "year,month"
  //   - "year(timestamp),month(timestamp)"
  //   - "days(timestamp)"
  //   - "bucket(16,user_id)"
  string default_partition_by = 3;

  // Enable automatic schema evolution.
  // Default: false
  bool evolve_schema_enabled = 4;

  // Force all columns to be nullable (optional).
  // Default: false
  bool schema_force_optional = 5;

  // Enable case-insensitive field name matching.
  // Default: false
  bool schema_case_insensitive = 6;
}

message IcebergControlSpec {
  // Consumer group ID prefix for control topic.
  // Default: "cg-control"
  string group_id_prefix = 1;
  
  // Interval between commits in milliseconds.
  // Default: 300000 (5 minutes)
  google.protobuf.Int64Value commit_interval_ms = 2;
  
  // Commit operation timeout in milliseconds.
  // Default: 30000 (30 seconds)
  google.protobuf.Int64Value commit_timeout_ms = 3;
  
  // Number of threads for commit operations.
  // Default: cores * 2
  google.protobuf.Int64Value commit_threads = 4;
  
  // Prefix for transactional operations.
  // Default: ""
  string transactional_prefix = 5;
}

message Connector {
  reserved 7 to 9;
  enum Health {

    // Health of the connector is unknown.
    HEALTH_UNKNOWN = 0;

    // Connector is running.
    ALIVE = 1;

    // Connector has failed to start.
    DEAD = 2;
  }

  enum Status {

    // Connector state is unknown.
    STATUS_UNKNOWN = 0;

    // Connector is running normally.
    RUNNING = 1;

    // Connector has encountered a problem and cannot operate.
    ERROR = 2;

    // Connector is paused.
    PAUSED = 3;
  }

  // Name of the connector.
  string name = 1;

  // Maximum number of connector tasks. Default value is the number of brokers.
  google.protobuf.Int64Value tasks_max = 2;

  // A set of properties passed to Managed Service for Apache Kafka® with the connector configuration.
  // Example: `sync.topics.config.enabled: true`.
  map<string, string> properties = 3;

  // Connector health.
  Health health = 4;

  // Current status of the connector.
  Status status = 5;

  // ID of the Apache Kafka® cluster that the connector belongs to.
  string cluster_id = 6;

  // Additional settings for the connector.
  oneof connector_config {
    // Configuration of the MirrorMaker connector.
    ConnectorConfigMirrorMaker connector_config_mirrormaker = 10;

    // Configuration of S3-Sink connector.
    ConnectorConfigS3Sink connector_config_s3_sink = 11;

    // Configuration of Iceberg Sink connector.
    ConnectorConfigIcebergSink connector_config_iceberg_sink = 12;
  }
}

message ConnectorConfigMirrorMaker {
  // Source cluster connection configuration.
  ClusterConnection source_cluster = 1;

  // Target cluster connection configuration.
  ClusterConnection target_cluster = 2;

  // List of Kafka topics, separated by `,`.
  string topics = 3;

  // Replication factor for automatically created topics.
  google.protobuf.Int64Value replication_factor = 4;
}

message ClusterConnection {
  // Alias of cluster connection configuration.
  // Examples: `source`, `target`.
  string alias = 1;

  // Type of connection to Apache Kafka® cluster.
  oneof cluster_connection {
    // Connection configuration of the cluster the connector belongs to. As all credentials are already known, leave this parameter empty.
    ThisCluster this_cluster = 2;

    // Configuration of connection to an external cluster with all the necessary credentials.
    ExternalClusterConnection external_cluster = 3;
  }
}

message ThisCluster {}

message ExternalClusterConnection {
  reserved 3;
  // List of bootstrap servers of the cluster, separated by `,`.
  string bootstrap_servers = 1;

  // SASL username to use for connection to the cluster.
  string sasl_username = 2;

  // SASL mechanism to use for connection to the cluster.
  string sasl_mechanism = 4;

  // Security protocol to use for connection to the cluster.
  string security_protocol = 5;
}

// An Apache Kafka® S3-Sink
// connector resource.
message ConnectorConfigS3Sink {
  // List of Kafka topics, separated by ','.
  string topics = 1;

  // The compression type used for files put on GCS.
  // The supported values are: `gzip`, `snappy`, `zstd`, `none`.
  // Optional, the default is `none`.
  string file_compression_type = 2;

  // Max records per file.
  google.protobuf.Int64Value file_max_records = 3;

  // Credentials for connecting to S3 storage.
  S3Connection s3_connection = 4;
}

// Resource for S3Connection -
// settings of connection to AWS-compatible S3 storage, that
// are source or target of Kafka S3-connectors.
// YC Object Storage is AWS-compatible.
message S3Connection {
  // Name of the bucket.
  string bucket_name = 1;
  oneof storage {
    // Configuration for connection to S3 storage.
    ExternalS3Storage external_s3 = 2;
  }
}

message ExternalS3Storage {
  // ID of the AWS access key.
  string access_key_id = 1;
  // S3 endpoint.
  string endpoint = 2;
  // AWS region. Default is 'us-east-1'.
  string region = 3;
}


// Resource for Kafka Iceberg Sink Connector.
message ConnectorConfigIcebergSink {
  oneof topics_source {
    // List of Kafka topics, separated by ','.
    string topics = 1;

    // Regex of Kafka topics.
    string topics_regex = 2;
  }

  // Credentials for connecting to Managed Hive Metastore.
  MetastoreConnection metastore_connection = 3;

  // Credentials for connecting to S3 storage.
  IcebergS3Connection s3_connection = 4;

  // Table routing strategy
  oneof table_routing {
    // Static table routing
    StaticTables static_tables = 5;
    
    // Dynamic table routing
    DynamicTables dynamic_tables = 6;
  }

  // Optional table settings
  IcebergTablesConfig tables_config = 7;

  // Optional control settings
  IcebergControl control_config = 8;
}

message StaticTables {
  // List of tables, separated by ','.
  string tables = 1;
}

message DynamicTables {
  // Field in the message to define the target table
  // The iceberg.tables.dynamic-enabled field is set to true
  string route_field = 1;
}


message MetastoreConnection {
  // Thrift URI of Hive Metastore
  // Format: "thrift://host:9083"
  string catalog_uri = 1;
  // Warehouse root directory in S3
  // Format: "s3a://bucket-name/path/to/warehouse"
  // Can be any path within the bucket, not necessarily "/warehouse"
  string warehouse = 2;
}

// Resource for IcebergS3Connection -
// settings of connection to AWS-compatible S3 storage, that
// are target of Kafka Iceberg-connectors.
// YC Object Storage is AWS-compatible.
message IcebergS3Connection {
  oneof storage {
    // Configuration for connection to S3 storage.
    ExternalIcebergS3Storage external_s3 = 1;
  }
}

message ExternalIcebergS3Storage {
  // ID of the AWS access key.
  string access_key_id = 1;
  // S3 endpoint.
  string endpoint = 2;
  // AWS region. Default is 'us-east-1'.
  string region = 3;
}

message IcebergTablesConfig {

  // Default Git-like branch name for Iceberg commits.
  // Default: "main"
  string default_commit_branch = 1;

  // List of columns used as identifiers for upsert operations, separated by ','.
  string default_id_columns = 2;

  // Comma-separated list of columns or transform expressions for table partitioning.
  // Defines physical data layout for query optimization.
  // Examples:
  //   - "date"
  //   - "year,month"
  //   - "year(timestamp),month(timestamp)"
  //   - "days(timestamp)"
  //   - "bucket(16,user_id)"
  string default_partition_by = 3;

  // Enable automatic schema evolution.
  // Default: false
  bool evolve_schema_enabled = 4;

  // Force all columns to be nullable (optional).
  // Default: false
  bool schema_force_optional = 5;

  // Enable case-insensitive field name matching.
  // Default: false
  bool schema_case_insensitive = 6;
}

message IcebergControl {
  // Consumer group ID prefix for control topic.
  // Default: "cg-control"
  string group_id_prefix = 1;
  
  // Interval between commits in milliseconds.
  // Default: 300000 (5 minutes)
  google.protobuf.Int64Value commit_interval_ms = 2;
  
  // Commit operation timeout in milliseconds.
  // Default: 30000 (30 seconds)
  google.protobuf.Int64Value commit_timeout_ms = 3;
  
  // Number of threads for commit operations.
  // Default: cores * 2
  google.protobuf.Int64Value commit_threads = 4;
  
  // Prefix for transactional operations.
  // Default: ""
  string transactional_prefix = 5;
}
