[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "target-feature=+crt-static",
]
[target.x86_64-apple-darwin]
linker = "clang"
rustflags = [
  "-C", "target-feature=+crt-static",
  "-C", "link-arg=-undefined",
  "-C", "link-arg=dynamic_lookup",
  "-C", "target-cpu=x86-64-v2",
]
[target.aarch64-apple-darwin]
linker = "clang"
rustflags = [
  "-C", "target-feature=+crt-static",
  "-C", "link-arg=-undefined",
  "-C", "link-arg=dynamic_lookup",
  "-C", "target-cpu=apple-m1",
]
