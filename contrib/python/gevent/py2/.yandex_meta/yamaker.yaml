requirements:
  - contrib/libs/c-ares
  - contrib/libs/libev
  - selectors2
mark_as_py2_sources:
  - gevent/_socket2.py
  - gevent/_ssl2.py
  - gevent/_sslgte279.py
  - gevent/_util_py2.py
mark_as_py3_sources:
  - gevent/_socket3.py
  - gevent/_ssl3.py
mark_as_cython_c:
  - gevent/resolver/cares.pyx
mark_as_cython_c_h:
  - gevent/libev/corecext.pyx
exclude_from_macros:
  - gevent/_ffi/alloc.c
  - gevent/libev/stathelper.c
  - hstrerror_stub.c
exclude:
  - deps/*
  - gevent/_generated_include/*
  - gevent/*.html
  - gevent/testing/*
  - gevent/libev/_corecffi_build.py
  - gevent/libev/_corecffi_cdef.c
  - gevent/libev/_corecffi_source.c
  - gevent/libev/corecffi.py
  - gevent/libev/watcher.py
  - gevent/libuv/*
keep:
  - hstrerror_stub.c
