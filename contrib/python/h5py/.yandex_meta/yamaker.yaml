requirements:
  - contrib/libs/hdf5/hl/src
  - contrib/libs/hdf5/src
mark_as_cython_c:
  - h5py/*.pyx
exclude_from_macros:
  - h5py/*.txt
  - licenses/*.txt
  - lzf/*.txt
exclude:
  - lzf/example.c
copy:
  - licenses/*
  - lzf/*
keep:
  - h5py/_hdf5.pxd
  - h5py/config.pxi
  - h5py/defs.pyx
  - h5py/defs.pxd
