service: ydb_appteam
title: Python YDB SDK
arcanum:
  review:
    override_policy: override
    disabling_policy: need_reason
    ignore_self_ship: false
    groups:
      - name: reviewers
        # Roles must extend the list from a parent contrib folder
        roles: [ "ydb_appteam_python:@scope=development", "cc:duty", "cc:developer", "cc:consultant" ]
    rules:
    - reviewers:
        name: reviewers
        ship: 1
