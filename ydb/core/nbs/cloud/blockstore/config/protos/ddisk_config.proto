syntax = "proto3";

package NYdb.NBS.NProto;

////////////////////////////////////////////////////////////////////////////////

message TDDiskConfig
{
    optional bool UseSQPoll = 1;
    optional bool UseIOPoll = 2;
    optional bool ForcePDiskFallback = 3;
}

message TPBufferConfig
{
    // Initial number of chunks occupied by PB, default 4
    optional uint32 InitChunks = 1;

    // In memory cache limit in bytes, default 128MiB
    optional uint64 MaxInMemoryCache = 2;

    // default 8
    optional uint32 MaxChunkRestoreInflight = 3;

    // default 5000ms
    optional uint32 UpdateFreeSpaceInfoMilliseconds = 4;

    // Storage limit for one tablet in bytes, default 4GiB
    optional uint64 PerTabletStorageLimit = 5;

    // Maximum number of sectors used for barrier erases
    // default 128
    optional uint32 MaxBarriersLimit = 6;

    // Maximum number of chunks persistent buffer can allocate
    optional uint32 MaxChunks = 7;

    // default 1024
    optional uint32 MaxPendingEventsQueueSize = 8;

    // default true
    optional bool EnableFastErases = 9;

    optional uint32 WritesBatchingPeriodMicroseconds = 10;

    // default true
    optional bool EnableWritesBatching = 11;

    // Reserve free sectors for higher-priority barrier movement and fast erase operations.
    // default 256, equal to the default disk operations max inflight size
    optional uint32 MinFreeSectorsReserve = 12;

    // Allocate a new chunk proactively when free space drops below this percentage
    // of the currently owned capacity. 0 disables proactive allocation. Default 10%.
    optional uint32 PreallocateFreeSpaceThresholdPercent = 13;

    // Deallocate a chunk proactively when free space is over this percentage
    // of the currently owned capacity. 100% disables proactive deallocation. Default 90%.
    optional uint32 DeallocateFreeSpaceThresholdPercent = 14;

    // Deallocate a chunk proactively when it has been freed for this many seconds.
    // Default 30 seconds.
    optional uint32 DeallocateThresholdSeconds = 15;

    // TEvListPersistentBuffer must not observe a partially-applied write/erase for its tablet: the
    // listing is deferred (queued and retried) while any disk operation is in flight for the
    // requesting tablet. These parameters bound how long/how often we wait before giving up and
    // replying with an OVERLOADED error.
    optional uint32 ListPersistentBufferMaxRetries = 16;
    optional uint32 ListPersistentBufferRetryPeriodMilliseconds = 17;
}
