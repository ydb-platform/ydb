syntax = "proto3";

package NYdb.NBS.NProto;

////////////////////////////////////////////////////////////////////////////////

// Mode of write requests.
enum EWriteMode {
    // Persistent Buffers replication is going from one of PBuffers. Write request
    // will be sended to 1 PBuffer, then this PBuffer will send request to other PBuffer.
    PBufferReplication = 0;

    // WriteRequests are going to all Persistent Buffers directly.
    DirectPBuffersFilling = 1;
}

////////////////////////////////////////////////////////////////////////////////

message TDDiskConfig
{
    optional bool UseSQPoll = 1;
    optional bool UseIOPoll = 2;
    optional bool ForcePDiskFallback = 3;
    optional bool UseInMemoryDDisk = 4;
}

message TPBufferConfig
{
    // Initial number of chunks occupied by PB, default 4
    optional uint32 InitChunks = 1;

    // In memory cache limit in bytes, default 128MiB
    optional uint64 MaxInMemoryCache = 2;

    // default 8
    optional uint32 MaxChunkRestoreInflight = 3;

    // default 5000ms
    optional uint32 UpdateFreeSpaceInfoMilliseconds = 4;

    // Storage limit for one tablet in bytes, default 4TiB
    optional uint64 PerTabletStorageLimit = 5;

    // Maximum number of sectors used for barrier erases
    // One sector store 240 tablet barriers
    optional uint32 MaxBarriersLimit = 6;

    // Maximum number of chunks persistent buffer can allocate
    optional uint32 MaxChunks = 7;
}

message TStorageServiceConfig
{
    // SchemeShard directory for volumes.
    optional string SchemeShardDir = 1;

    // Channel configuration.
    optional string SsdSystemChannelPoolKind = 2;
    optional string SsdLogChannelPoolKind = 3;
    optional string SsdIndexChannelPoolKind = 4;

    // FolderId of this NBS instance. Used for authorization.
    optional string FolderId = 5;

    // Number of reties before pipe client reports failure.
    optional uint32 PipeClientRetryCount = 6;

    // Minimum timeout before pipe client reconnect attempt.
    optional uint32 PipeClientMinRetryTime = 7;

    // Maximum timeout before pipe client reconnect attempt.
    optional uint32 PipeClientMaxRetryTime = 8;

    // DDisk pool name for direct storage.
    optional string DDiskPoolName = 9;

    // DDisk pool name for persistent buffer.
    optional string PersistentBufferDDiskPoolName = 10;

    // Period (in milliseconds) for sampling traces.
    optional uint32 TraceSamplePeriod = 11;

    // Sync requests will be sended when sync queue reaches
    // this size for ddisk.
    optional uint32 SyncRequestsBatchSize = 12;

    // Default stripe size for volumes.
    optional uint64 StripeSize = 13;

    optional EWriteMode WriteMode = 14;

    // Timeout for request to PBuffer.
    optional uint32 PBufferReplyTimeoutMicroseconds = 15;

    // Delay (in microseconds) before writing to handoff persistent buffers.
    optional uint32 WriteHedgingDelay = 16;

    // Size of VChunk (in bytes). Default is 128 MB.
    optional uint64 VChunkSize = 17;

    // Thread pool size.
    optional uint32 ThreadPoolSize = 18;

    optional TDDiskConfig GlobalDDiskConfig = 19;
    optional TPBufferConfig GlobalPBufferConfig = 20;

    // Timeout (in milliseconds) for write request handlers.
    optional uint32 WriteRequestTimeout = 21;
}
