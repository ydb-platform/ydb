metadata:
  kind: MainConfig
  cluster: ""
  version: 0
config:
  yaml_config_enabled: true
  erasure: block-4-2
  fail_domain_type: disk
  self_management_config:
    enabled: true
  default_disk_type: SSD
  host_configs:
  - drive:
    - path: /dev/disk/by-partlabel/kikimr_nvme_01
      type: SSD
    - path: /dev/disk/by-partlabel/kikimr_nvme_02
      type: SSD
    - path: /dev/disk/by-partlabel/kikimr_nvme_03
      type: SSD
    - path: /dev/disk/by-partlabel/kikimr_nvme_04
      type: SSD
    host_config_id: 1
  hosts:
    - host: vla5-8200.search.yandex.net
      host_config_id: 1
      location:
        body: 1
        data_center: 'zone-a'
        rack: '1'
    - host: vla5-8281.search.yandex.net
      host_config_id: 1
      location:
        body: 2
        data_center: 'zone-a'
        rack: '2'
    - host: vla5-8247.search.yandex.net
      host_config_id: 1
      location:
        body: 3
        data_center: 'zone-a'
        rack: '3'
    - host: vla5-8268.search.yandex.net
      host_config_id: 1
      location:
        body: 4
        data_center: 'zone-a'
        rack: '4'
    - host: vla5-8186.search.yandex.net
      host_config_id: 1
      location:
        body: 5
        data_center: 'zone-a'
        rack: '5'
    - host: vla5-8236.search.yandex.net
      host_config_id: 1
      location:
        body: 6
        data_center: 'zone-a'
        rack: '6'
    - host: vla5-8262.search.yandex.net
      host_config_id: 1
      location:
        body: 7
        data_center: 'zone-a'
        rack: '7'
    - host: vla5-8226.search.yandex.net
      host_config_id: 1
      location:
        body: 8
        data_center: 'zone-a'
        rack: '8'
  interconnect_config:
    start_tcp: true
  grpc_config:
    services_enabled:
    - legacy
  nbs_config:
    enabled: true
    nbs_storage_config:
      scheme_shard_dir: /Root/NBS
      folder_id: "testFolder"
      ssd_system_channel_pool_kind: "ssd"
      ssd_log_channel_pool_kind: "ssd"
      ssd_index_channel_pool_kind: "ssd"
      pipe_client_retry_count: 3
      pipe_client_min_retry_time: 1
      pipe_client_max_retry_time: 10
  log_config:
    entry:
      - component: NBS_PARTITION
        level: 7

tracing_config:
   backend:
     opentelemetry:
       collector_url: grpc://localhost:4316
       service_name: drbasic
