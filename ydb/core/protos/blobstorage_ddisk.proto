syntax = "proto3";

package NKikimrBlobStorage.NDDisk;

message TReplyStatus {
    enum E {
        // Default/uninitialized value; should never appear in a completed reply.
        UNKNOWN = 0;

        // Operation completed successfully.
        OK = 1;

        // Generic unrecoverable I/O error (e.g. EIO on a write, or an unexpected io_uring failure).
        ERROR = 2;

        // The connecting tablet's generation is lower than the maximum generation DDisk has seen for
        // that tablet, meaning this is a stale instance that must be rejected.
        BLOCKED = 3;

        // A read io_uring operation returned EIO: the data on disk is corrupted or otherwise
        // unreadable and cannot be recovered by retrying.
        LOST_DATA = 4;

        // The request cannot be served because the session context is no longer valid. Causes:
        // - tablet restarted (generation changed)
        // - DDisk or persistent buffer actor restarted
        // - interconnect session was re-established
        // - DDiskInstanceGuid mismatch (DDisk lost its data and was re-initialized)
        SESSION_MISMATCH = 5;

        // The request parameters are logically invalid. Causes:
        // - attempting to write the same LSN with different data
        // - selector range is out of the persistent buffer record bounds (read)
        // - offset or size is not aligned to the sector size (default 4 KiB)
        // - payload is not contiguous or not aligned to the sector size
        // - request spans more than one vchunk
        // - persistent buffer write data size exceeds the 512 KiB limit
        INCORRECT_REQUEST = 6;

        // Returned by a persistent buffer read when the requested record does not exist,
        // or was erased while the read operation was in flight.
        MISSING_RECORD = 7;

        // - Returned during sync when a newer sync request covers the same block range
        // (same tablet and vchunk), making this in-flight sync request's result stale.
        // - Persistent buffer write request with LSN less than or equal to barrier
        OUTDATED = 8;

        // The I/O subsystem cannot fulfill the request right now. Possible causes:
        // - io_uring submission queue pressure (EAGAIN / EWOULDBLOCK)
        // - out of disk space (ENOSPC) or memory (ENOMEM)
        // The caller should retry after a back-off.
        OVERLOADED = 9;

        // The persistent buffer cannot accept a new write record. Causes:
        // - not enough free space in the persistent buffer
        // - the per-tablet space occupation limit in the persistent buffer has been reached
        OVERFILL = 10;
    }
}

// DDisk identifier (used for interfacing DDisk actor) determines the location of DDisk.

message TDDiskId {
    uint32 NodeId = 1;
    uint32 PDiskId = 2;
    uint32 DDiskSlotId = 3;
}

// DDisk query credentials define who asks for an operation: tablet identifier, its generation (to prevent races with
// obsolete instances) and DDiskInstanceGuid to identify cases when DDisk data was lost.

message TQueryCredentials {
    uint64 TabletId = 1;
    uint32 Generation = 2;
    optional fixed64 DDiskInstanceGuid = 3;
    bool FromPersistentBuffer = 4;
}

// DDisk block selector defines the range of blocks we are operating at; it includes through-numbered vChunk index and
// offset/size in that chunks measured in bytes.

message TBlockSelector {
    uint64 VChunkIndex = 1;
    uint32 OffsetInBytes = 2;  // 4 KiB alignment
    uint32 Size = 3;           // 4 KiB alignment
}

// DDisk write instruction contains information about data being written. It can contain information about rope passing
// along with event, or, say, an RDMA pointer to get that data from the sender.

message TWriteInstruction {
    oneof Payload {
        uint32 PayloadId = 1; // payload is attached to event as a rope
        // <-- add RDMA here
    }
}

// DDisk read instruction says how to perform read and where to store the result.

message TReadInstruction {
    bool ReturnInRopePayload = 1;
    // <-- add RDMA here
}

// DDisk read result contains information about read data.

message TReadResult {
    oneof Payload {
        uint32 PayloadId = 1;
        // <-- add RDMA here
    }
}

// This message is issued by Partition Tablet on start to establish connection with specific DDisk. Connection stands
// until node is disconnected or DDisk is terminated as an actor. EVERY message to DDisk MUST be sent through
// InterconnectSession mentioned in TEvConnectResult message.

message TEvConnect {
    TQueryCredentials Credentials = 1;
}

message TEvConnectResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;
    fixed64 DDiskInstanceGuid = 3; // instance guid gets changed every time DDisk loses its data
}

// DDisk disconnect query is issued when tablet is going to be stopped gracefully and don't need DDisk to keep any
// context about that tablet anymore.

message TEvDisconnect {
    TQueryCredentials Credentials = 1;
}

message TEvDisconnectResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;
}

message TEvWrite {
    TQueryCredentials Credentials = 1;
    TBlockSelector Selector = 2;
    TWriteInstruction Instruction = 3;
}

message TEvWriteResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;
}

message TEvRead {
    TQueryCredentials Credentials = 1;
    TBlockSelector Selector = 2;
    TReadInstruction Instruction = 3;
}

message TEvReadResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;
    TReadResult ReadResult = 3;
}

message TEvWritePersistentBuffer {
    TQueryCredentials Credentials = 1;
    TBlockSelector Selector = 2;
    uint64 Lsn = 3;
    TWriteInstruction Instruction = 4;
}

message TEvWritePersistentBufferResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;
    optional double FreeSpace = 3;
    optional double PDiskNormalizedOccupancy = 4;
}

message TEvReadThenWritePersistentBuffers {
    TQueryCredentials Credentials = 1;
    uint64 Lsn = 2;
    uint32 Generation = 3;
    repeated TDDiskId PersistentBufferIds = 4;
    uint32 ReplyTimeoutMicroseconds = 5;
}

message TEvWritePersistentBuffers {
    TQueryCredentials Credentials = 1;
    TBlockSelector Selector = 2;
    uint64 Lsn = 3;
    TWriteInstruction Instruction = 4;
    repeated TDDiskId PersistentBufferIds = 5;
    uint32 ReplyTimeoutMicroseconds = 6;
}

message TEvWritePersistentBuffersResult {
    message TResult {
        TDDiskId PersistentBufferId = 1;
        TEvWritePersistentBufferResult Result = 2;
    }

    repeated TResult Result = 1;
}

message TEvReadPersistentBuffer {
    TQueryCredentials Credentials = 1;
    TBlockSelector Selector = 2;
    uint64 Lsn = 3;
    TReadInstruction Instruction = 4;
    uint32 Generation = 5;
}

message TEvReadPersistentBufferResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;
    TReadResult ReadResult = 3;
    uint64 VChunkIndex = 4;
    uint32 OffsetInBytes = 5;
    uint32 SizeInBytes = 6;
}

message TSegmentResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;
}

message TEvSyncWithPersistentBuffer {
    message TSegment {
        TBlockSelector Selector = 1;
        uint64 Lsn = 2;
        uint32 Generation = 3;
    }

    TQueryCredentials Credentials = 1;
    repeated TSegment Segments = 2;
    TDDiskId DDiskId = 3;
    fixed64 DDiskInstanceGuid = 4;
}

message TEvSyncWithPersistentBufferResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;

    repeated TSegmentResult SegmentResults = 3;
}

message TEvSyncWithDDisk {
    message TSegment {
        TBlockSelector Selector = 1;
    }

    TQueryCredentials Credentials = 1;
    repeated TSegment Segments = 2;
    TDDiskId DDiskId = 3;
    fixed64 DDiskInstanceGuid = 4;
}

message TEvSyncWithDDiskResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;

    repeated TSegmentResult SegmentResults = 3;
}

message TEvErasePersistentBuffer {
    TQueryCredentials Credentials = 1;
    reserved 2;
    uint64 Lsn = 3; // Erase all lsns for tablet less than or equal to
    reserved 4;
}


message TEvBatchErasePersistentBuffer {
    message TEraseInfo {
        reserved 1;
        uint64 Lsn = 2;
        uint32 Generation = 3;
    }

    TQueryCredentials Credentials = 1;
    repeated TEraseInfo Erases = 2;
}

message TEvErasePersistentBufferResult {
    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;
    optional double FreeSpace = 3;
    optional double PDiskNormalizedOccupancy = 4;
}

message TEvListPersistentBuffer {
    TQueryCredentials Credentials = 1;
}

message TEvListPersistentBufferResult {
    message TPersistentBufferRecord {
        TBlockSelector Selector = 1;
        uint64 Lsn = 2;
        uint32 Generation = 3;
    }

    TReplyStatus.E Status = 1;
    optional string ErrorReason = 2;
    repeated TPersistentBufferRecord Records = 3;
}

message TDirectBlockGroupAllocation {
    message TDDiskRecord {
        TDDiskId DDiskId = 1; // if not set, then this item is empty
        uint32 NumChunksClaimed = 2; // number of chunks claimed within this DDisk
    }

    repeated TDDiskRecord DDiskRecord = 1;
    repeated TDDiskId PersistentBufferDDiskId = 2;
}
