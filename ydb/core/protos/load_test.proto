import "ydb/core/protos/blobstorage_base.proto";
import "ydb/core/protos/blobstorage_ddisk.proto";
import "ydb/core/protos/blobstorage_disk.proto";
import "ydb/core/protos/datashard_load.proto";
import "ydb/core/nbs/cloud/blockstore/tools/testing/loadtest/lib/protos/nbs2_load.proto";

package NKikimr;
option java_package = "ru.yandex.kikimr.proto";

message TEvLoadTestRequest {
    // an item for interval distribution setting
    message TIntervalInfo {
        message TIntervalUniform {
            optional uint32 MinMs = 1;
            optional uint32 MaxMs = 2;
            optional uint32 MinUs = 3;
            optional uint32 MaxUs = 4;
        }
        message TIntervalPoisson {
            optional double Frequency = 1; // Hz
            optional uint32 MaxIntervalMs = 2;
        }
        optional double Weight = 1;
        oneof Distribution {
            TIntervalUniform Uniform = 2;
            TIntervalPoisson Poisson = 3;
        }
    }
    // an item for size distribution setting
    message TSizeInfo {
        optional uint32 Min = 1;
        optional uint32 Max = 2;
        optional double Weight = 3;
    }
    message TStorageLoad {
        message TContentType {
            enum E {
                Random = 1;
                Validated = 2;
            }
        }
        message TInitialBlobAllocation {
            oneof DataSize {
                uint64 TotalSize = 1;
                uint64 BlobsNumber = 2;
            }
            repeated TSizeInfo BlobSizes = 3;
            optional uint32 MaxWritesInFlight = 4;
            optional uint32 MaxWriteBytesInFlight = 5;
            optional NKikimrBlobStorage.EPutHandleClass PutHandleClass = 6;
            optional uint32 DelayAfterCompletionSec = 7;
            optional uint32 CollectedBlobsPerMille = 8;
        }

        message TRequestInfo {
            optional float SendTime = 1;
            optional uint64 Type = 2;
            optional uint32 Size = 3;
            optional NKikimrBlobStorage.EPutHandleClass PutHandleClass = 4;
        }
        message TTabletInfo {
            oneof Id {
                uint64 TabletId = 8;
                string TabletName = 7;  // only used to distinguish different tablets, will be reassigned
            }
            optional uint32 Channel = 2;
            optional uint32 GroupId = 3;
            optional uint32 Generation = 4;
            repeated TRequestInfo Requests = 5;
            optional float ScriptedCycleDurationSec = 6;
        }
        message THardRateDispatcherInfo {
            optional double RequestsPerSecondAtStart = 1;
            optional double RequestsPerSecondOnFinish = 2;
        }
        message TPerTabletProfile {
            repeated TTabletInfo Tablets = 1;
            repeated TSizeInfo WriteSizes = 2;
            repeated TIntervalInfo WriteIntervals = 3;
            optional uint32 MaxInFlightWriteRequests = 4;
            optional uint32 MaxInFlightWriteBytes = 5;
            repeated TIntervalInfo FlushIntervals = 6;
            optional NKikimrBlobStorage.EPutHandleClass PutHandleClass = 7;

            reserved 8; // (deprecated) optional bool Soft = 8;
            optional uint32 MaxInFlightReadRequests = 9;
            optional uint32 MaxInFlightReadBytes = 10;
            repeated TIntervalInfo ReadIntervals = 11;
            repeated TSizeInfo ReadSizes = 12;
            optional uint64 MaxTotalBytesWritten = 13;
            optional NKikimrBlobStorage.EGetHandleClass GetHandleClass = 14;

            optional THardRateDispatcherInfo WriteHardRateDispatcher = 15;
            optional THardRateDispatcherInfo ReadHardRateDispatcher = 16;

            optional TInitialBlobAllocation InitialAllocation = 17;

            optional uint32 TracingThrottlerRate = 18 [default = 0];
            optional uint32 TracingThrottlerBurst = 19 [default = 0];

            optional uint32 NumberOfRandomGroupsToPick = 20 [default = 0];
            optional TContentType.E ContentType = 21;
            optional uint32 RdmaMode = 22 [default = 0];

            repeated TIntervalInfo BarrierIntervals = 24;
            optional uint32 MaxBarriersInFlight = 25 [default = 10];
            optional uint32 BarrierChannelCount = 26 [default = 100];

            optional bool WriteKeepFlags = 23 [default = false];
        };
        optional uint64 Tag = 1;
        optional uint32 DurationSeconds = 2;
        optional bool RequestTracking = 3 [default = false];
        repeated TPerTabletProfile Tablets = 4;
        reserved 5; // (deprecated) optional uint64 ScheduleThresholdUs = 5;
        reserved 6; // (deprecated) optional uint64 ScheduleRoundingUs = 6;
    }
    message TStop {
        optional uint64 Tag = 1;
        optional bool RemoveAllTags = 2;
    }
    enum ELogMode {
        LOG_PARALLEL = 1;
        LOG_SEQUENTIAL = 2;
        LOG_NONE = 3;
    }
    message TPDiskWriteLoad {
        message TChunkInfo {
            optional uint32 Slots = 1; // number of slots per chunk
            optional uint32 Weight = 2; // probability weight
        }
        optional uint64 Tag = 1;
        optional uint32 PDiskId = 2;
        optional uint64 PDiskGuid = 3;
        optional NKikimrBlobStorage.TVDiskID VDiskId = 4;
        repeated TChunkInfo Chunks = 5;
        optional uint32 DurationSeconds = 6;
        optional uint32 InFlightWrites = 7;
        optional ELogMode LogMode = 8;
        optional bool Sequential = 9 [default = true];
        optional uint32 IntervalMsMin = 10;
        optional uint32 IntervalMsMax = 11;
        optional bool Reuse = 12 [default = false];
        optional bool IsWardenlessTest = 13 [default = false];
        optional uint32 DelayBeforeMeasurementsSeconds = 14 [default = 15];
    }
    message TDDiskLoad {
        // In a most simple case there is a single TArea.
        // However for various test cases it is possible to split
        // DDisk into areas of different size, weight and I/O order (seq or random).
        message TArea {
            enum EAreaInit {
                INIT_NONE = 0;

                // requires ExpectedChunkSize: the idea is just to preallocate all chunks
                INIT_ZEROES_FIRST_BLOCK = 1;

                INIT_ZEROES_FULL = 2;
            }
            optional uint32 AreaSize = 1; // must be a multiple of IoSizeBytes
            optional EAreaInit InitType = 2 [default = INIT_ZEROES_FIRST_BLOCK];
            optional uint32 Weight = 3 [default = 1]; // probability weight
            optional bool Sequential = 4 [default = true];
        }

        optional uint64 Tag = 1;
        optional NKikimrBlobStorage.NDDisk.TDDiskId DDiskId = 2;
        optional uint32 DurationSeconds = 3;
        optional uint32 DelayBeforeMeasurementsSeconds = 4 [default = 15];
        optional uint32 InFlight = 5;
        optional uint32 InitInFlight = 6;

        optional uint32 IntervalMsMin = 7;
        optional uint32 IntervalMsMax = 8;

        optional uint32 ExpectedChunkSize = 9 [default = 134217728]; // 128 MB, must be divisible by IoSizeBytes

        repeated TArea Areas = 10;

        // Use simulated DDisk: no real I/O, copy to/from RAM buffer instead.
        optional bool Simulate = 11;
        // Number of simulated DDisk actors used in round-robin.
        optional uint32 SimulateActorsCount = 12 [default = 1];

        optional bool AlignSourceData = 13 [default = true];

        reserved 14; // BackgroundReadRatio

        // When true, the load test performs reads instead of writes.
        optional bool IsReadLoad = 15 [default = false];
        // Enable io_uring SQPOLL mode for DDisk direct I/O.
        optional bool SQPoll = 16 [default = false];
        // Enable io_uring IOPOLL mode for DDisk direct I/O.
        optional bool IOPoll = 17 [default = false];
        // Request size for read/write operations in bytes.
        optional uint32 IoSizeBytes = 18 [default = 4096];
    }

    message TPersistentBufferWriteLoad {
        enum EMeasureType {
            WRITE = 0;
            READ = 1;
            ERASE = 2;
        }

        message TWriteInfo {
            optional uint32 Size = 1;
            optional uint32 Weight = 2;
        }

        optional uint64 Tag = 1;
        optional NKikimrBlobStorage.NDDisk.TDDiskId DDiskId = 2;
        optional uint32 DurationSeconds = 3;
        optional uint32 DelayBeforeMeasurementsSeconds = 4 [default = 15];
        optional uint32 InFlightWrites = 5;

        repeated TWriteInfo WriteInfos = 6;

        // Percentage of PB fill average (0-100)
        optional uint32 FillRatio = 7 [default = 50];

        // Read to write requests ratio percentage. 0 - no read, 100 - 1:1 read and write
        optional uint32 ReadRatio = 8 [default = 100];

        // Erase to write requests ratio percentage. 0 - no erase, 100 - 1:1 erase and write
        optional uint32 EraseRatio = 9 [default = 10];

        optional EMeasureType MeasureType = 10 [default = WRITE];
    }

    message TVDiskLoad {
        optional uint64 Tag = 1;

        // full VDisk identifier
        optional NKikimrBlobStorage.TVDiskID VDiskId = 2;

        reserved 3; // obsolete field
        reserved 4; // obsolete field
        optional NKikimrBlobStorage.TGroupInfo GroupInfo = 16;

        // tablet id, channel and generation used in blob ids and barriers
        optional uint64 TabletId = 5;
        optional uint32 Channel = 6;
        optional uint32 Generation = 7;

        // duration of the test in seconds
        optional uint32 DurationSeconds = 8;

        // a distribution of intervals between adjacent writes
        repeated TIntervalInfo WriteIntervals = 9;

        // a distribution of write block sizes (expressed in bytes of BlobSize; i.e. PartSize bytes are actually written)
        repeated TSizeInfo WriteSizes = 10;

        // maximum number of unconfirmed parallel writes
        optional uint32 InFlightPutsMax = 11;

        // soft maximum of total in flight put bytes
        optional uint64 InFlightPutBytesMax = 12;

        // put handle class
        optional NKikimrBlobStorage.EPutHandleClass PutHandleClass = 13;

        // a distribution of intervals between barrier advances
        repeated TIntervalInfo BarrierAdvanceIntervals = 14;

        // minimum distance kept between current Step of written blobs and CollectStep of barriers
        optional uint32 StepDistance = 15;
    }
    message TPDiskReadLoad {
        message TChunkInfo {
            optional uint32 Slots = 1; // number of slots per chunk
            optional uint32 Weight = 2; // probability weight
        }
        optional uint64 Tag = 1;
        optional uint32 PDiskId = 2;
        optional uint64 PDiskGuid = 3;
        optional NKikimrBlobStorage.TVDiskID VDiskId = 4;
        repeated TChunkInfo Chunks = 5;
        optional uint32 DurationSeconds = 6;
        optional uint32 InFlightReads = 7;
        optional bool Sequential = 9 [default = false];

        optional uint32 IntervalMsMin = 10;
        optional uint32 IntervalMsMax = 11;

        optional bool IsWardenlessTest = 13 [default = false];
        optional uint32 DelayBeforeMeasurementsSeconds = 14 [default = 15];
    }
    message TPDiskLogLoad {
        message TWorkerConfig {
            optional NKikimrBlobStorage.TVDiskID VDiskId = 1;
            optional uint32 MaxInFlight = 2;

            // Measurement units of all parameters is bytes
            optional uint32 SizeIntervalMin = 3;
            optional uint32 SizeIntervalMax = 4;
            optional uint64 BurstInterval = 5;
            optional uint64 BurstSize = 6;
            optional uint64 StorageDuration = 7;

            optional uint64 MaxTotalBytesWritten = 8;
        }

        optional uint64 Tag = 1;
        optional uint32 PDiskId = 2;
        optional uint64 PDiskGuid = 3;

        optional uint32 DurationSeconds = 5;
        repeated TWorkerConfig Workers = 7;

        optional bool IsWardenlessTest = 8 [default = false];
        optional uint32 DelayBeforeMeasurementsSeconds = 9 [default = 15];
    }
    message TKeyValueLoad {
        message TWorkerConfig {
            optional string KeyPrefix = 1;
            optional uint32 MaxInFlight = 2;
            optional uint32 Size = 11; // data size, bytes
            optional bool IsInline = 9 [default = false];
            optional uint32 LoopAtKeyCount = 10 [default = 0]; // 0 means "do not loop"
        }
        optional uint64 Tag = 1;
        optional uint64 TargetTabletId = 2;
        optional uint32 DurationSeconds = 5;
        repeated TWorkerConfig Workers = 7;
    }

    message TKqpLoad {
        message TStockWorkload {
            optional uint64 ProductCount = 1 [default = 100];
            optional uint64 Quantity = 2 [default = 1000];
            optional uint64 OrderCount = 3 [default = 100];
            optional uint64 Limit = 4 [default = 10];
            optional bool PartitionsByLoad = 5 [default = true];
        }
        message TKvWorkload {
            optional uint64 InitRowCount = 1 [default = 1000];
            optional bool PartitionsByLoad = 2 [default = true];
            optional uint64 MaxFirstKey = 3 [default = 18446744073709551615];
            optional uint64 StringLen = 4 [default = 8];
            optional uint64 ColumnsCnt = 5 [default = 2];
            optional uint64 RowsCnt = 6 [default = 1];
        }
        optional uint64 Tag = 1;
        optional uint32 DurationSeconds = 2;
        optional uint32 WindowDuration = 3;
        optional string WorkingDir = 4;
        optional uint32 NumOfSessions = 5;
        optional bool IncreaseSessions = 11;
        optional bool DeleteTableOnFinish = 6;
        optional uint32 UniformPartitionsCount = 7;
        optional uint32 WorkloadType = 8;
        optional string QueryType = 12;
        oneof Workload {
            TStockWorkload Stock = 9;
            TKvWorkload Kv = 10;
        }
    }
    message TNBS2Load {
        optional uint64 Tag = 1;
        optional string Name = 2;
        optional uint32 DurationSeconds = 3;
        optional string DirectPartitionId = 4;
        optional NYdb.NBS.NProto.TRangeTest RangeTest = 5;
    }

    message TMemoryLoad {
        optional uint64 Tag = 1;
        optional uint32 DurationSeconds = 2;
        optional uint64 BlockSize = 3;
        optional uint64 IntervalUs = 4;
    }

    // NBS-DBG-like persistent tablet load.
    //
    // TNbsDbgLikeLoadTablet imitates a simplified NBS tablet: it owns one or more
    // DBGs, allows configuring performance-related functionality, and provides
    // interface to write/read similarly to real NBS users. TNbsDbgLikeLoadActor
    // generates the actual load.
    //
    // TAllocConfig and TWorkloadConfig are split because allocation persists
    // across runs — Create once, Run many times with different
    // TWorkloadConfig (typically varying MaxInFlight).
    message TNbsDbgLikeLoad {
        // Allocation-time configuration. Persisted once at Create time and
        // reused across Runs. Editing it after Create requires Delete first.
        message TAllocConfig {
            // BSC-side TabletId — the credential PB / DDisk validate on every
            // request (TQueryCredentials, ddisk.h:47-79). Distinct from the
            // YDB tablet id (which is Hive-assigned).
            optional uint64 TabletId = 1;

            optional string DDiskPoolName = 2 [default = "ddp1"];
            optional string PersistentBufferDDiskPoolName = 3 [default = "ddp1"];

            // Number of DBGs this tablet owns. Each DBG = 5 (DDisk, PB) pairs
            // with 10 wire connections; production-like value is 32.
            optional uint32 NumDirectBlockGroups = 4 [default = 1];

            // Per-DDisk vChunk capacity reservation; v1 uses 1 (one vChunk
            // per DBG, indexed by VChunkIndex=0).
            optional uint32 TargetNumVChunks = 5 [default = 1];

            // Upper bound on in-vChunk offset; must be <= cluster PDisk
            // chunk size. Default 128 MiB matches DefaultVChunkSize.
            optional uint64 VChunkSizeBytes = 6 [default = 134217728];

            // Storage-pool bindings used when Hive creates the tablet.
            // Forwarded onto each TEvHive::TEvCreateTablet::AddBindedChannels
            // entry so the tablet can boot. Empty means "use a single
            // empty-name binding" (lets Hive pick the default).
            repeated string TabletStoragePools = 7;

            // Number of hosts/nodes/disks per DBG that worker should use.
            // Must not exceed the current max fan-out supported by the worker.
            optional uint32 HostsPerDbg = 8 [default = 5];
        }

        // On-disk schema row for one DBG (see Schema::Dbgs in
        // nbs_dbg_like_load_tablet.cpp). Replaces the legacy host-byte-order
        // memcpy pack. Older rows that fail to parse are dropped at boot.
        message TPersistedDbgIds {
            repeated NKikimrBlobStorage.NDDisk.TDDiskId DDiskIds = 1;
            repeated NKikimrBlobStorage.NDDisk.TDDiskId PBIds = 2;
        }

        message TConfigureTablet {
            // Global cap on tracked LSNs across DBGs
            optional uint32 MaxInflightLsns = 1 [default = 4096];

            // FlushBatchSize / EraseBatchSize are arbitrary trade-offs;
            // By default we set a large value to mimic original "all"
            // behaviour of NBS partition
            optional uint32 FlushBatchSize = 2 [default = 10000];
            optional uint32 EraseBatchSize = 3 [default = 10000];

            // SyncRequestsBatchSize mirrors the partition's
            // TStorageConfig::SyncRequestsBatchSize
            // (nbs/cloud/blockstore/config/config.cpp:30, default 10). Gate is
            // checked per-DBG, before per-destination batching: DoFlush /
            // DoErase early-return on a DBG when its ready-queue size is below
            // this value. Set to 1 to disable the gate. Bypassed during drain
            // so the shutdown sweep can finalize any leftover LSNs.
            optional uint32 SyncRequestsBatchSize = 4 [default = 10];

            // Forwarded onto the wire (TEvWritePersistentBuffers
            // .ReplyTimeoutMicroseconds, blobstorage_ddisk.proto:192). Default
            // 50 ms matches the partition's DefaultPBufferReplyTimeout.
            optional uint32 PBufferReplyTimeoutMicroseconds = 5 [default = 50000];

            // How many of the persisted DBGs participate in the next Run.
            // 0 = use all N. The worker validates every TNbsWrite/Read address
            // against the slice [0, NumDirectBlockGroupsToUse) of Dbgs.
            optional uint32 NumDirectBlockGroupsToUse = 6 [default = 0];

            // Per-Run fixed I/O size (= ReadWriteSizeKiB * 1024 from TWorkloadConfig).
            // The worker rejects TNbsWrite/Read with SizeBytes != IoSizeBytes.
            // 0 = uninitialised (worker stays idle until the first
            // TConfigureTablet with a nonzero value arrives).
            optional uint32 IoSizeBytes = 7 [default = 0];

            // Skip multi-PB replication and DDisk flush. Writes go to only the
            // coordinator PB; the reply is sent as soon as that single PB confirms.
            // LSNs bypass PBufferWritten/PBufferFlushing and jump directly to
            // PBufferFlushed so DoErase can still reclaim PB space.
            // Enables benchmarking raw single-PB write latency.
            // Reads are not supported when this flag is set; ReadRatio must be 0.
            optional bool DisableReplication = 8 [default = false];
        }

        // Load-actor -> worker: "write SizeBytes at this flat address".
        // The flat address is decoded by the worker as
        //   bytesPerDbg    = TargetNumVChunks * VChunkSizeBytes
        //   dbgIndex       = Address / bytesPerDbg          // [0, M_eff)
        //   rem            = Address % bytesPerDbg
        //   vChunkIndex    = rem / VChunkSizeBytes
        //   offsetInVChunk = rem % VChunkSizeBytes
        // SizeBytes must equal the IoSizeBytes installed by the last
        // TConfigureTablet (worker rejects with ERROR otherwise).
        message TNbsWrite {
            optional uint64 Address = 1;
            optional uint32 SizeBytes = 2;

            // Required rope payload referenced by the AddPayload() return
            // value. The tablet rejects writes without PayloadId.
            oneof Payload {
                uint32 PayloadId = 3;
                // <-- add RDMA here
            }
        }

        // Worker -> load-actor: exactly one reply per TNbsWrite, emitted
        // when write quorum is reached or definitively fails. The load
        // actor times the request itself (start timestamp held in its
        // own in-flight map keyed by event cookie) and recovers
        // SizeBytes from the same map.
        message TNbsWriteResult {
            optional uint32 Status = 1;
        }

        // Load-actor -> worker: "read SizeBytes at this flat address";
        // worker picks PB or DDisk source based on per-LSN state at the slot.
        message TNbsRead {
            optional uint64 Address = 1;
            optional uint32 SizeBytes = 2;
        }

        // Worker -> load-actor: read complete. Read payload travels as a
        // TRope payload on the actor event and is referenced by PayloadId,
        // matching the DDisk TReadResult payload convention.
        message TNbsReadResult {
            optional uint32 Status = 1;

            oneof Payload {
                uint32 PayloadId = 2;
                // <-- add RDMA here
            }
        }

        // Per-Run workload-shaping configuration.
        message TWorkloadConfig {
            optional uint64 Tag = 1;
            optional uint32 DurationSeconds = 2;
            optional uint32 DelayBeforeMeasurementsSeconds = 3 [default = 15];

            // How many of the allocated DBGs (TAllocConfig.NumDirectBlockGroups = N)
            // participate in this run. 0 = use all N; otherwise use the first M
            // DBGs in tablet/actor order (1 <= M <= N).
            optional uint32 NumDirectBlockGroupsToUse = 4 [default = 0];

            // Combined cap on concurrent in-flight ops (writes + reads).
            // ReadRatio controls what fraction of in-flight slots are used for reads.
            optional uint32 MaxInFlight = 5 [default = 32];

            optional uint32 ReadRatio = 6 [default = 0];

            // false = uniform random over the user-level address space
            //         (M * TargetNumVChunks * VChunkSizeBytes; M = effective DBG
            //         count for this run, see NumDirectBlockGroupsToUse);
            // true  = sequential round-robin over the same flat space.
            optional bool Sequential = 7 [default = false];

            // Read/write payload size in KiB. Must be >= 4, a multiple of 4,
            // and ReadWriteSizeKiB * 1024 <= VChunkSizeBytes (from TAllocConfig).
            optional uint32 ReadWriteSizeKiB = 8 [default = 4];

            optional TConfigureTablet TabletConfig = 15;

            // If non-zero, stop the run once this many writes have completed
            // successfully and then drain. Whichever condition fires first
            // wins (DurationSeconds or StopOnWritesDoneCount). 0 = no limit.
            optional uint32 StopOnWritesDoneCount = 16 [default = 0];
        }

        // Hive-assigned tablet ID; the load actor opens a tablet pipe to this
        // tablet to deliver TEvNbsWrite / TEvNbsRead.
        optional uint64 NbsDbgLikeTabletId = 101;

        optional TWorkloadConfig WorkloadConfig = 102;
        optional uint64 Tag = 100;
    }

    message TInterconnectLoad {
        optional uint64 Tag = 1;
        optional string Name = 2;
        optional uint32 Channel = 3;
        repeated uint32 NodeHops = 4;
        optional uint32 SizeMin = 5;
        optional uint32 SizeMax = 6;
        optional uint32 InFlyMax = 7;
        optional uint32 IntervalMinUs = 8;
        optional uint32 IntervalMaxUs = 9;
        optional bool SoftLoad = 10;
        optional uint32 DurationSeconds = 11;
        optional bool UseProtobufWithPayload = 12;
        optional uint32 RdmaMode = 13;
    }

    optional uint64 Cookie = 1;
    oneof Command {
        TStop Stop = 3;
        TStorageLoad StorageLoad = 2;
        TPDiskWriteLoad PDiskWriteLoad = 4;
        TVDiskLoad VDiskLoad = 5;
        TPDiskReadLoad PDiskReadLoad = 6;
        TPDiskLogLoad PDiskLogLoad = 7;
        TKeyValueLoad KeyValueLoad = 8;
        TKqpLoad KqpLoad = 9;
        TMemoryLoad MemoryLoad = 10;
        NKikimrDataShardLoad.TEvYCSBTestLoadRequest YCSBLoad = 11;
        TInterconnectLoad InterconnectLoad = 15;
        TNBS2Load NBS2Load = 16;
        TDDiskLoad DDiskLoad = 17;
        TPersistentBufferWriteLoad PersistentBufferWriteLoad = 18;
        TNbsDbgLikeLoad NbsDbgLikeLoad = 19;
    }
    optional uint64 Tag = 12;
    optional string Uuid = 13;
    optional uint64 Timestamp = 14;
}

// ----------------------------------------------------------------------------
// NBS-DBG-like load tablet wire protocol (sent over a tablet pipe to the
// TNbsDbgLikeLoadTablet — see ydb/core/load_test/nbs_dbg_like_load_tablet.h).
// ----------------------------------------------------------------------------

enum ENbsLoadTabletStatus {
    NBSLT_OK = 0;
    NBSLT_ALREADY_INITIALIZED = 1;
    NBSLT_BSC_ERROR = 2;
    NBSLT_BUSY = 3;
    NBSLT_NOT_INITIALIZED = 4;
    NBSLT_INTERNAL_ERROR = 5;
}

message TEvNbsLoadTabletAllocateGroups {
    optional TEvLoadTestRequest.TNbsDbgLikeLoad.TAllocConfig AllocConfig = 1;
}

message TEvNbsLoadTabletAllocateGroupsResult {
    optional ENbsLoadTabletStatus Status = 1;
    optional string ErrorReason = 2;
}

message TEvNbsLoadTabletDelete {
}

message TEvNbsLoadTabletDeleteResult {
    optional ENbsLoadTabletStatus Status = 1;
    optional string ErrorReason = 2;
}

// Read-only alloc summary for monitoring / load-test UI listing.
message TEvNbsLoadTabletGetSummary {
}

message TEvNbsLoadTabletGetSummaryResult {
    optional ENbsLoadTabletStatus Status = 1;
    optional string ErrorReason = 2;
    optional string DDiskPoolName = 3;
    optional string PersistentBufferDDiskPoolName = 4;
    optional uint32 NumDirectBlockGroups = 5;
    optional uint64 VChunkSizeBytes = 6;
    optional uint32 TargetNumVChunks = 7;
}

message TEvLoadTestResponse {
    optional uint32 Status = 1; // EResponseStatus from ydb/core/client/base/msgbus.h
    optional string ErrorReason = 2;
    optional uint64 Cookie = 3;
    optional uint64 Tag = 4;
}

message TEvNodeFinishResponse {
    message TNodeStats {
        optional uint64 Transactions = 1;
        optional float TransactionsPerSecond = 2;
        optional float ErrorsPerSecond = 3;
        repeated float Percentiles = 4;
    }

    optional string Uuid = 1;
    optional uint32 NodeId = 2;
    optional bool Success = 3;
    optional uint64 FinishTimestamp = 4;
    optional string ErrorReason = 5;
    optional TNodeStats Stats = 6;
    optional string LastHtmlPage = 7;
    optional string JsonResult = 8;
}
