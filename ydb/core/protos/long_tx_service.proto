package NKikimrLongTxService;

option java_package = "ru.yandex.kikimr.proto";

import "ydb/library/actors/protos/actors.proto";
import "ydb/public/api/protos/ydb_status_codes.proto";
import "ydb/public/api/protos/ydb_issue_message.proto";
import "ydb/core/protos/data_events.proto";

message TLongTxId {
    optional bytes UniqueId = 1;
    optional uint32 NodeId = 2;
    optional uint64 SnapshotStep = 3;
    optional uint64 SnapshotTxId = 4;
}

message TEvBeginTx {
    enum EMode {
        MODE_UNSPECIFIED = 0;
        MODE_READ_ONLY = 1;
        MODE_WRITE_ONLY = 2;
        MODE_READ_WRITE = 3;
    }

    optional string DatabaseName = 1;
    optional EMode Mode = 2;
}

message TEvBeginTxResult {
    optional Ydb.StatusIds.StatusCode Status = 1;
    repeated Ydb.Issue.IssueMessage Issues = 2;
    optional TLongTxId LongTxId = 3;
}

message TEvCommitTx {
    optional TLongTxId LongTxId = 1;
}

message TEvCommitTxResult {
    optional Ydb.StatusIds.StatusCode Status = 1;
    repeated Ydb.Issue.IssueMessage Issues = 2;
}

message TEvRollbackTx {
    optional TLongTxId LongTxId = 1;
}

message TEvRollbackTxResult {
    optional Ydb.StatusIds.StatusCode Status = 1;
    repeated Ydb.Issue.IssueMessage Issues = 2;
}

message TEvAttachColumnShardWrites {
    message TWrite {
        optional uint64 ColumnShard = 1;
        optional uint64 WriteId = 2;
    }

    optional TLongTxId LongTxId = 1;
    repeated TWrite Writes = 2;
}

message TEvAttachColumnShardWritesResult {
    optional Ydb.StatusIds.StatusCode Status = 1;
    repeated Ydb.Issue.IssueMessage Issues = 2;
}

// Lock wait edges are uniquely identified by the (Owner, RequestId) tuple. Owner is the actor
// reporting the wait (e.g. a DataShard), and RequestId is an id unique to the particular
// Owner. These unique ids allow us to make the TEvUpdateLockWaitEdges message idempotent.
message TLockWaitEdgeId {
    optional NActorsProto.TActorId Owner = 1;
    optional uint64 RequestId = 2;
}

message TLockWaitEdge {
    optional TLockWaitEdgeId Id = 1;

    optional uint64 BlockerLockId = 2;
    optional uint32 BlockerLockNode = 3;
}


message TEvSubscribeLock {
    optional uint64 LockId = 1;
    optional uint32 LockNode = 2;

    // When (re)subscribing, tell the remote lock its current wait edges that are local to us.
    repeated TLockWaitEdge LocalWaitEdges = 3;
}

message TEvLockStatus {
    enum EStatus {
        STATUS_UNSPECIFIED = 0;
        STATUS_SUBSCRIBED = 1;
        STATUS_NOT_FOUND = 2;
        STATUS_UNAVAILABLE = 3;
    }

    optional uint64 LockId = 1;
    optional uint32 LockNode = 2;
    optional EStatus Status = 3;

    // Lock creation timestamp in microseconds since the unix epoch, used to
    // choose the yongest victim among deadlocked transactions.
    // May be zero (unset) when this lock is not expected to cause a deadlock,
    // this includes serializable transactions which never acquire pessimistic
    // locks, and placeholder (MultiXact) locks which are used in place of
    // a set of other transactions or savepoints.
    optional uint64 LockTimestampUs = 4;

    // Used to sync current lock wait edges at the time of the subscription.
    repeated TLockWaitEdge WaitEdges = 5;
}

message TEvUnsubscribeLock {
    optional uint64 LockId = 1;
    optional uint32 LockNode = 2;
}

message TRemoteSnapshotInfo {
    optional uint64 SnapshotStep = 1;
    optional uint64 SnapshotTxId = 2;
    repeated NKikimrDataEvents.TTableId TableIds = 3;
    optional NActorsProto.TActorId SessionActorId = 4;
}

message TNodeRemoteSnapshotCollectionInfo {
    optional uint32 NodeId = 1;
    optional uint64 UpdateTime = 2;
}

message TRemoteSnapshots {
    repeated TRemoteSnapshotInfo Snapshots = 1;
    optional uint64 BorderStep = 2;
    optional uint64 BorderTxId = 3;
    repeated TNodeRemoteSnapshotCollectionInfo NodesCollectionInfo = 4;
}

message TPropagationTree {
    repeated NActorsProto.TActorId ChildrenActorIds = 1;
}

message TEvCollectSnapshots {
    optional TPropagationTree Tree = 1;
}

message TEvCollectSnapshotsResult {
    optional TRemoteSnapshots Snapshots = 1;
}

message TEvPropagateSnapshots {
    optional TPropagationTree Tree = 1;
    optional TRemoteSnapshots Snapshots = 2;
}

message TEvPropagateSnapshotsResult {
}

message TSnapshotExchangeBoardNodeInfo {
    optional bytes DataCenterId = 1;
    optional NActorsProto.TActorId Owner = 2;
}

message TEvUpdateLockWaitEdges {
    optional uint64 LockId = 1;
    optional uint32 LockNode = 2;

    repeated TLockWaitEdge Added = 3;
    repeated TLockWaitEdgeId Removed = 4;
}
