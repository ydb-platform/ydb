package NKikimrPQ;
option java_package = "ru.yandex.kikimr.proto";

message TMLPMessageId {
    optional uint32 PartitionId = 1;
    optional uint64 Offset = 2;
}

message TMLPMessageMeta {
    optional string MessageGroupId = 1;
    optional uint64 SentTimestampMilliseconds = 2;
    optional uint32 ApproximateReceiveCount = 3;
    optional uint64 ApproximateFirstReceiveTimestampMilliseconds = 4;
};

message TMLPMessage {
    optional TMLPMessageId Id = 1;
    optional bytes Data = 2;
    optional TMLPMessageMeta MessageMeta = 3;
}

message TMLPMetrics {
    optional uint64 TotalCommittedMessageCount = 2;
    optional uint64 TotalMovedToDLQMessageCount = 3;
    optional uint64 TotalScheduledToDLQMessageCount = 1;
    optional uint64 TotalPurgedMessageCount = 4;
    optional uint64 TotalDeletedByDeadlinePolicyMessageCount = 5;
    optional uint64 TotalDeletedByRetentionMessageCount = 6;
}

enum EReadWithKeepOrder {
    READ_WITH_KEEP_ORDER_UNSPECIFIED = 0;
    READ_WITH_KEEP_ORDER_BLOCK_ALL = 1; /* reading from a partition returns an empty list of messages */
    READ_WITH_KEEP_ORDER_ALLOW_ALL = 3; /* no reading restrictions */
}

message TExternalLockedMessageGroupsId {
    optional uint32 ParentPartitionId = 1;
    optional uint64 Generation = 2;
    optional uint64 ConsumerGeneration = 3; /* increases when the consumer is recreated */
    optional uint64 Step = 4; /* increases when the new full state is sent */

    optional EReadWithKeepOrder Mode = 5;
}

message TMLPStorageSnapshot {
    message TConfiguration {
        optional string ConsumerName = 1;
        optional uint64 Generation = 2;
    }
    optional TConfiguration Configuration = 1;

    optional uint64 FormatVersion = 2;

    optional uint64 WALIndex = 3;

    message TMeta {
        optional uint64 FirstOffset = 1;
        optional uint64 FirstUncommittedOffset = 2;
        optional uint64 BaseDeadlineSeconds = 3;
        optional uint64 BaseWriteTimestampSeconds = 4;
    }
    optional TMeta Meta = 4;


    optional TMLPMetrics Metrics = 5;

    optional bytes Messages = 6;
    optional bytes SlowMessages = 7;
    optional bytes DLQMessages = 8;

    repeated TExternalLockedMessageGroupsId ExternalLockedMessageGroupsId = 9;
}

message TMLPStorageWAL {
    optional uint64 Generation = 1;
    optional uint64 FormatVersion = 2;
    optional uint64 WALIndex = 3;

    optional TMLPMetrics Metrics = 4;

    optional uint64 BaseDeadlineSeconds = 5;
    optional uint64 BaseWriteTimestampSeconds = 6;

    optional uint64 FirstOffset = 7;
    optional bytes ChangedMessages = 8;
    optional uint64 FirstAddedOffset = 9;
    optional bytes AddedMessages = 10;

    optional uint64 SlowFirstOffset = 11;
    repeated uint64 MovedToSlowZone = 12;
    repeated uint64 DeletedFromSlowZone = 13;

    optional bytes AddedToDLQMessages = 14;
    optional uint64 FirstDLQSeqNo = 15;

    repeated TExternalLockedMessageGroupsId ExternalLockedMessageGroupsId = 16;
}

message TMessageDeduplicationIdWAL {
    message TMessage {
        optional string DeduplicationId = 1;
        optional uint64 OffsetDelta = 2;
        optional uint64 ExpirationTimestampMillisecondsDelta = 3;
    }
    repeated TMessage Message = 1;
};
