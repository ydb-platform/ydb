import "ydb/public/api/protos/ydb_issue_message.proto";
import "ydb/public/api/protos/ydb_operation.proto";
import "ydb/public/api/protos/ydb_status_codes.proto";
import "ydb/public/api/protos/ydb_table.proto";
import "google/protobuf/timestamp.proto";

package NKikimrSetColumnConstraint;
option java_package = "ru.yandex.kikimr.proto";

message TSetColumnConstraintSettings {
    optional string TablePath = 1;
    repeated string NotNullColumns = 2;
}

message TSetColumnConstraint {
    optional uint64 Id = 1;
    optional Ydb.Table.IndexBuildState.State State = 2;
    optional TSetColumnConstraintSettings Settings = 3;
    optional float Progress = 4 [default = 0];
    optional google.protobuf.Timestamp StartTime = 5;
    optional google.protobuf.Timestamp EndTime = 6;
    optional string UserSID = 7;
}

message TEvCreateRequest {
    optional Ydb.Operations.OperationParams OperationParams = 1;
    optional uint64 TxId = 2;
    optional string DatabaseName = 3;
    optional TSetColumnConstraintSettings Settings = 4;
    optional string UserSID = 5;
}

message TEvCreateResponse {
    optional uint64 TxId = 1;
    optional Ydb.StatusIds.StatusCode Status = 2;
    repeated Ydb.Issue.IssueMessage Issues = 3;
    optional TSetColumnConstraint SetColumnConstraint = 4;
    optional sint32 SchemeStatus = 5 [default = -1]; // flat_tx_scheme.proto - enum EStatus, -1 is inexistent enum value
}
