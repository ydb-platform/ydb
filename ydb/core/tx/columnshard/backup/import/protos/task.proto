import "ydb/core/protos/flat_scheme_op.proto";
import "ydb/core/scheme/protos/type_info.proto";

package NKikimrColumnShardImportProto;

message TIdentifier {
    optional uint64 PathId = 1 [deprecated = true];
    optional uint64 SchemeShardLocalPathId = 2;
}

message TImportTask {
    optional TIdentifier Identifier = 1;
    optional uint64 TxId = 5;
    optional NKikimrSchemeOp.TRestoreTask RestoreTask = 6;
    repeated TColumnDescription Columns = 7;
    optional uint64 SchemaVersion = 8;
}

message TColumnDescription {
    optional string Name = 1;
    optional NKikimrProto.TTypeInfo TypeInfo = 2;
    optional uint32 TypeId = 3;
    optional uint32 ColumnId = 4;
}

message TSessionControlContainer {
    optional string ClassName = 1;
}

message TImportSessionLogic {
    optional TImportTask Task = 1;
}

message TImportSessionState {
    optional string Status = 1;
}
