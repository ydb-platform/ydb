import "ydb/core/protos/flat_scheme_op.proto";
import "ydb/core/scheme/protos/type_info.proto";

package NKikimrColumnShardExportProto;

message TIdentifier {
    optional uint64 PathId = 1;
}

message TExportTask {
    optional TIdentifier Identifier = 1;
    optional uint64 TxId = 5;
    optional NKikimrSchemeOp.TBackupTask BackupTask = 6;
    repeated TColumnDescription Columns = 7;
}

message TColumnDescription {
    optional string Name = 1;
    optional NKikimrProto.TTypeInfo TypeInfo = 2;
    optional uint32 TypeId = 3;
}

message TSessionControlContainer {
    optional string ClassName = 1;
}

message TExportSessionLogic {
    optional TExportTask Task = 1;
}

message TExportSessionState {
    optional string Status = 1;
}
