# DOCUMENTATION_MODEL.yaml
# Машинообработаемая модель структуры документации YDB
#
# Эта модель описывает иерархию документации, целевую аудиторию, жанры и назначение каждого раздела.
# Используется документаторским скиллом и другими автоматизированными инструментами для:
# - Понимания где размещать новый контент
# - Валидации структуры PR-ов с документацией
# - Генерации статей по шаблонам
#
# Поля:
#   id: уникальный идентификатор раздела (используется в путях и ссылках)
#   title: название раздела (как видит пользователь)
#   path: относительный путь в репозитории (без языка)
#   genres: тип контента [theory, guide, reference, faq, recipe, release-notes, links]
#   audience: целевая аудитория [all, newcomers, decision-makers, app-developers, devops, security-engineers, contributors, analysts, integrations]
#   purpose: назначение раздела (для чего он нужен)
#   for_whom: для кого написан (описание аудитории)
#   subsections: разделы третьего уровня (если есть)

documentation:
  primary_sections:

    # ===== Начинающие пользователи =====
    - id: quickstart
      title: Начало работы
      path: core/quickstart
      genres: [guide]
      audience: [newcomers]
      purpose: Пошаговое введение в YDB для новых пользователей
      for_whom: Люди, впервые работающие с YDB, которые хотят быстро настроить сервер и написать первые запросы
      subsections: []

    # ===== Концепции и архитектура =====
    - id: concepts
      title: Концепции
      path: core/concepts
      genres: [theory]
      audience: [all, decision-makers, newcomers]
      purpose: Высокоуровневый теоретический обзор YDB, её функций, терминологии и архитектуры
      for_whom: Широкая аудитория с минимальными предварительными знаниями, включая руководителей
      subsections:
        - id: concepts-analytics
          title: Аналитика
          path: core/concepts/analytics
          purpose: Концепции аналитического анализа данных в YDB
        - id: concepts-datamodel
          title: Модель данных
          path: core/concepts/datamodel
          purpose: Основные концепции структуры данных и моделирования в YDB
        - id: concepts-query-execution
          title: Выполнение запросов
          path: core/concepts/query_execution
          purpose: Как YDB выполняет запросы и оптимизирует их

