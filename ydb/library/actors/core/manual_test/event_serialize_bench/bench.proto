option cc_enable_arenas = true;

package NActorsBench;

message TFiveU64 {
    optional fixed64 Value1 = 1;
    optional fixed64 Value2 = 2;
    optional fixed64 Value3 = 3;
    optional fixed64 Value4 = 4;
    optional fixed64 Value5 = 5;
}

message TThirtyU64 {
    optional fixed64 Value1 = 1;
    optional fixed64 Value2 = 2;
    optional fixed64 Value3 = 3;
    optional fixed64 Value4 = 4;
    optional fixed64 Value5 = 5;
    optional fixed64 Value6 = 6;
    optional fixed64 Value7 = 7;
    optional fixed64 Value8 = 8;
    optional fixed64 Value9 = 9;
    optional fixed64 Value10 = 10;
    optional fixed64 Value11 = 11;
    optional fixed64 Value12 = 12;
    optional fixed64 Value13 = 13;
    optional fixed64 Value14 = 14;
    optional fixed64 Value15 = 15;
    optional fixed64 Value16 = 16;
    optional fixed64 Value17 = 17;
    optional fixed64 Value18 = 18;
    optional fixed64 Value19 = 19;
    optional fixed64 Value20 = 20;
    optional fixed64 Value21 = 21;
    optional fixed64 Value22 = 22;
    optional fixed64 Value23 = 23;
    optional fixed64 Value24 = 24;
    optional fixed64 Value25 = 25;
    optional fixed64 Value26 = 26;
    optional fixed64 Value27 = 27;
    optional fixed64 Value28 = 28;
    optional fixed64 Value29 = 29;
    optional fixed64 Value30 = 30;
}

message TFixed64Array30 {
    repeated fixed64 Values = 1 [packed = true];
}

message TTriple {
    optional fixed32 A = 1;
    optional fixed32 B = 2;
    optional fixed32 C = 3;
}

message TTripleArray10 {
    repeated TTriple Values = 1;
}

message TPayloadBytes {
    optional uint32 PayloadId = 1;
}

message TBlobId3x64 {
    optional fixed64 RawX1 = 1;
    optional fixed64 RawX2 = 2;
    optional fixed64 RawX3 = 3;
}

message TVDiskId5x32 {
    optional uint32 GroupID = 1;
    optional uint32 GroupGeneration = 2;
    optional uint32 Ring = 3;
    optional uint32 Domain = 4;
    optional uint32 VDisk = 5;
}

message TMsgQoSToy {
    optional uint32 DeadlineSeconds = 1;
    optional fixed64 Cost = 2;
    optional uint32 ExtQueueId = 3;
}

message TTimestampsToy {
    optional fixed64 SentByDSProxyUs = 1;
    optional fixed64 ReceivedByVDiskUs = 2;
    optional fixed64 SentByVDiskUs = 3;
    optional fixed64 ReceivedByDSProxyUs = 4;
}

message TExtraBlockCheckToy {
    optional fixed64 TabletId = 1;
    optional uint32 Generation = 2;
}

message TVPutLike {
    optional TBlobId3x64 BlobID = 1;
    optional fixed64 Checksum = 2;
    optional bool IssueKeepFlag = 3;
    optional bool IsZeroEntry = 4;
    optional TVDiskId5x32 VDiskID = 5;
    optional fixed64 FullDataSize = 6;
    optional bool IgnoreBlock = 7;
    optional bool NotifyIfNotReady = 8;
    optional fixed64 Cookie = 9;
    optional uint32 HandleClass = 10;
    optional TMsgQoSToy MsgQoS = 11;
    optional TTimestampsToy Timestamps = 12;
    repeated TExtraBlockCheckToy ExtraBlockChecks = 13;
    optional uint32 PayloadId = 14;
}
