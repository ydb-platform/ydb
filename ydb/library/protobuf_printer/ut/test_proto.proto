syntax = "proto3";

package NTestProto;

import "ydb/public/api/protos/annotations/sensitive.proto";

message TTestSubProto {
    uint64 i = 1;
}

message TTestProto {
    string s1 = 1;
    string s2 = 2;
    string token = 3;
    TTestSubProto msg = 4;
}

message TConnection1 {
    string database_id = 1;
    string token = 2 [(Ydb.sensitive) = true];
}

message TConnection2 {
    string database_id = 1;
    string login = 2 [(Ydb.sensitive) = true];
    string password = 3 [(Ydb.sensitive) = true];
}

message TConnectionSetting {
    oneof connection {
        TConnection1 connection1 = 1;
        TConnection2 connection2 = 2;
    }
}

message TConnectionContent {
    string name = 1;
    TConnectionSetting setting = 2;
    string description = 3;
}

message TRecursiveType {
    string name = 1;
    string login = 2 [(Ydb.sensitive) = true];
    repeated TRecursiveType types = 3;
}

message TComplexObject {
    bool sens_bool = 1 [(Ydb.sensitive) = true];
    int32 sens_int = 2 [(Ydb.sensitive) = true];
    double sens_double = 3 [(Ydb.sensitive) = true];
    string sens_string = 4 [(Ydb.sensitive) = true];
    repeated string arr1 = 5 [(Ydb.sensitive) = true];
    repeated string arr2 = 6 [(Ydb.sensitive) = true];
    map<string, string> map1 = 7 [(Ydb.sensitive) = true];
    optional TTestSubProto map2 = 8 [(Ydb.sensitive) = true];
    map<string, string> map3 = 9 [(Ydb.sensitive) = true];
}

message TInnerObject2 {
    repeated string a = 1;
}

message TInnerObject {
    map<string, string> inner_map = 1;
    uint64 value = 2;
    TInnerObject2 inner = 3;
}

message TBigObject {
    map<string, string> map = 1;
    repeated string list = 2;
    TInnerObject object = 3;
}
