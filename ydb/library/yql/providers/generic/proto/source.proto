syntax = "proto3";

option cc_enable_arenas = true;

// NOTE: never try to rename this package as it will break compatibility in DQ.
package NYql.Generic;

import "ydb/library/yql/providers/generic/connector/api/service/protos/connector.proto";
import "yql/essentials/providers/common/proto/gateways_config.proto";

message TSource {
    // Prepared Select expression
    NYql.NConnector.NApi.TSelect select = 2;

    // TokenName is used during query execution phase.
    // It's used to obtain appropriate structured token from `secureParams` map.
    string TokenName = 7;

    reserved 1, 3, 4, 5, 6;
}

//TODO(YQ-3093) move SA creds to some common message
message TLookupSource {
    NYql.TGenericDataSourceInstance data_source_instance = 1;
    string table = 2;

    // TokenName is used during query execution phase.
    // It's used to obtain appropriate structured token from `secureParams` map.
    string TokenName = 7;

    reserved 4, 5, 6;
}

// TSink describes a write (INSERT) target for the generic provider.
// It is used during query execution phase by the generic write (sink) actor.
message TSink {
    // Data source instance to write to.
    NYql.TGenericDataSourceInstance data_source_instance = 1;

    // Destination table name.
    string table = 2;

    // Serialized row type (YSON) of the data being written.
    string RowType = 3;

    // Connector schema of the target table, resolved at compile time
    // (via DescribeTable). Carried here so the write actor does not need to
    // re-describe the table at runtime.
    NYql.NConnector.NApi.TSchema schema = 4;

    // TokenName is used during query execution phase.
    // It's used to obtain appropriate structured token from `secureParams` map.
    string TokenName = 7;

    reserved 5, 6;
}
