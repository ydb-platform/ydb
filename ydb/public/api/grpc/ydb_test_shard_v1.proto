syntax = "proto3";

package Ydb.TestShardSet.V1;

import "ydb/public/api/protos/ydb_test_shard.proto";

service TestShardSetService {
    // Creates TestShardSet tablet(s)
    rpc CreateTestShardSet(Ydb.TestShardSet.CreateTestShardSetRequest) 
        returns (Ydb.TestShardSet.CreateTestShardSetResponse);

    // Deletes TestShardSet tablet(s)
    rpc DeleteTestShardSet(Ydb.TestShardSet.DeleteTestShardSetRequest)
        returns (Ydb.TestShardSet.DeleteTestShardSetResponse);
}
