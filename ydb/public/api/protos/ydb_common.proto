syntax = "proto3";
option cc_enable_arenas = true;

package Ydb;
option java_package = "com.yandex.ydb.common";
option java_outer_classname = "CommonProtos";

message FeatureFlag {
    enum Status {
        STATUS_UNSPECIFIED = 0;
        ENABLED = 1;
        DISABLED = 2;
    }
}

message CostInfo {
    // Total amount of request units (RU), consumed by the operation.
    double consumed_units = 1;
}

message QuotaExceeded {
    bool disk = 1;
}

// Specifies a point in database time
message VirtualTimestamp {
    uint64 plan_step = 1;
    uint64 tx_id = 2;
}

// Hint that the session is being shut down gracefully.
// The client should recreate the session on a different node.
message SessionShutdownHint {
}

// Hint that the node is being shut down.
// The client should recreate the session on a different node.
message NodeShutdownHint {
}

// Server-side hint about node/session state, used to signal the client
// that it should move to another node. Applicable to any streaming service.
message NodeHint {
    oneof hint {
        SessionShutdownHint session_shutdown = 1;
        NodeShutdownHint node_shutdown = 2;
    }
}
