metadata:
  kind: MainConfig
  cluster: ""
  version: 0
config:
  yaml_config_enabled: true
  erasure: mirror-3-dc
  fail_domain_type: rack
  self_management_config:
    enabled: true
  default_disk_type: SSD
  host_configs:
  - drive:
    - path: /dev/disk/by-partlabel/kikimr_nvme_01
      type: SSD 
    - path: /dev/disk/by-partlabel/kikimr_nvme_02
      type: SSD 
    - path: /dev/disk/by-partlabel/kikimr_nvme_03
      type: SSD 
    - path: /dev/disk/by-partlabel/kikimr_nvme_04
      type: SSD 
    - path: /dev/disk/by-partlabel/kikimr_nvme_05
      type: SSD 
    - path: /dev/disk/by-partlabel/kikimr_nvme_06
      type: SSD 
    host_config_id: 1
  hosts:
  - host: CHANGEME
    host_config_id: 1
    location:
      body: 1
      data_center: 'zone-a'
      rack: '1'
  actor_system_config:
    use_auto_config: true
    cpu_count: 8
  column_shard_config:
    alter_object_enabled: true
    default_compaction_preset: lc-buckets
  interconnect_config:
    start_tcp: true
  grpc_config:
    services_enabled:
    - legacy